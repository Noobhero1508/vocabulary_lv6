<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit 6 - Troubles While Traveling</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--primary:#06b6d4;--secondary:#3b82f6;--dark:#1e1b4b}*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Outfit',sans-serif;background:linear-gradient(135deg,#06b6d4 0%,#3b82f6 100%);min-height:100vh;padding:20px}.container{max-width:1400px;margin:0 auto}.back-btn{display:inline-flex;align-items:center;gap:8px;color:rgba(255,255,255,0.8);text-decoration:none;font-size:0.9rem;padding:8px 16px;border-radius:20px;background:rgba(255,255,255,0.15);transition:all 0.3s;margin-bottom:15px}.back-btn:hover{background:rgba(255,255,255,0.3);transform:translateX(-3px)}header{text-align:center;padding:30px 20px;color:white}header h1{font-size:2.5rem;text-shadow:2px 2px 10px rgba(0,0,0,0.3);margin-bottom:8px}header p{font-size:1.1rem;opacity:0.9}.stats{display:flex;justify-content:center;gap:20px;margin:20px 0;flex-wrap:wrap}.stat-card{background:rgba(255,255,255,0.2);backdrop-filter:blur(10px);padding:15px 30px;border-radius:16px;text-align:center;color:white}.stat-card h3{font-size:2rem}.stat-card p{opacity:0.8;font-size:0.85rem}.progress-bar{width:100%;max-width:500px;height:8px;background:rgba(255,255,255,0.3);border-radius:10px;margin:15px auto;overflow:hidden}.progress-fill{height:100%;background:linear-gradient(90deg,#10b981,#34d399);border-radius:10px;width:0%;transition:width 0.5s ease}.learned-count{text-align:center;color:white;margin-bottom:15px;font-size:0.9rem}.search-box{display:flex;justify-content:center;margin-bottom:15px}.search-box input{width:100%;max-width:500px;padding:12px 22px;border:none;border-radius:50px;font-size:1rem;box-shadow:0 5px 20px rgba(0,0,0,0.1);font-family:inherit}.search-box input:focus{outline:3px solid var(--primary)}.filter-tabs{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin:20px 0}.filter-btn{padding:10px 20px;border:none;border-radius:25px;background:rgba(255,255,255,0.2);color:white;cursor:pointer;transition:all 0.3s;font-family:inherit;font-size:0.9rem}.filter-btn:hover,.filter-btn.active{background:white;color:var(--primary);transform:translateY(-2px)}.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px;margin-top:20px}.vocab-card{background:white;border-radius:18px;padding:22px;box-shadow:0 8px 30px rgba(0,0,0,0.1);transition:all 0.3s ease;cursor:pointer;position:relative;overflow:hidden}.vocab-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:linear-gradient(180deg,var(--primary),var(--secondary))}.vocab-card:hover{transform:translateY(-4px);box-shadow:0 15px 40px rgba(0,0,0,0.15)}.vocab-card .word{font-size:1.3rem;font-weight:700;color:var(--dark);margin-bottom:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}.speak-btn{background:linear-gradient(135deg,var(--primary),var(--secondary));border:none;color:white;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all 0.3s ease;flex-shrink:0}.speak-btn:hover{transform:scale(1.15)}.speak-btn.speaking{animation:pulse 0.8s infinite;background:linear-gradient(135deg,#10b981,#34d399)}@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}.vocab-card .type{display:inline-block;font-size:0.7rem;color:#94a3b8;font-style:italic;margin-bottom:4px}.vocab-card .meaning{color:var(--primary);font-weight:500;margin-bottom:4px}.vocab-card .phrase{background:linear-gradient(135deg,#ecfeff,#cffafe);padding:12px;border-radius:10px;font-size:0.9rem;line-height:1.6;color:#334155;display:none}.vocab-card.expanded .phrase{display:block;animation:fadeIn 0.3s ease}.phrase-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}.phrase-header .speak-btn{width:26px;height:26px;font-size:11px}.phrase-label{font-weight:600;color:var(--primary);font-size:0.8rem}.phrase-text{margin:0}.category-tag{display:inline-block;padding:3px 10px;border-radius:15px;font-size:0.7rem;margin-bottom:8px;font-weight:500}.cat-airport{background:#dbeafe;color:#2563eb}.cat-problems{background:#fee2e2;color:#dc2626}.cat-security{background:#fef3c7;color:#d97706}.cat-idioms{background:#d1fae5;color:#059669}@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}footer{text-align:center;padding:30px;color:white;opacity:0.8;font-size:0.9rem}@media(max-width:768px){header h1{font-size:1.8rem}.vocab-grid{grid-template-columns:1fr}.stats{flex-direction:column;align-items:center}}
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-btn">← Quay lại</a>
    <header><h1>✈️ Unit 6: Troubles While Traveling</h1><p>Click thẻ để xem giải thích, double-click để đánh dấu đã học</p></header>
    <div class="stats"><div class="stat-card"><h3 id="totalWords">0</h3><p>Tổng từ</p></div><div class="stat-card"><h3 id="learnedWords">0</h3><p>Đã học</p></div><div class="stat-card"><h3>1</h3><p>Nhóm</p></div></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <p class="learned-count">Tiến độ: <span id="progressText">0%</span></p>
    <div class="search-box"><input type="text" id="searchInput" placeholder="🔍 Tìm kiếm..."></div>
    
    <div class="vocab-grid" id="vocabGrid"></div>
    <footer><p>💡 Double-click để đánh dấu đã học</p></footer>
</div>
<script>
const vocabularyData = [
            { word: "Hassle", type: "vocab", meaning: "Rắc rối", phrase: "Finding parking in the city is such a hassle.", category: "general" },
            { word: "Contest", type: "vocab", meaning: "Cuộc thi", phrase: "She won first prize in the singing contest.", category: "general" },
            { word: "Direction", type: "vocab", meaning: "Hướng dẫn", phrase: "Could you give me directions to the hospital?", category: "general" },
            { word: "Inedible", type: "vocab", meaning: "Không ăn được", phrase: "The meat was burnt and completely inedible.", category: "general" },
            { word: "Baggage = Luggage", type: "phrase/idiom", meaning: "Hánh lý", phrase: "We need to collect our baggage from the carousel.", category: "general" },
            { word: "InsufÏcient room in overhead bins", type: "phrase/idiom", meaning: "Không đủ chỗ trong cái thùng trên cao", phrase: "", category: "general" },
            { word: "InsufÏcient", type: "vocab", meaning: "Không đủ", phrase: "", category: "general" },
            { word: "Security screening", type: "phrase/idiom", meaning: "Sàng lọc an ning", phrase: "Please take off your shoes for the security screening.", category: "general" },
            { word: "Confiscate", type: "vocab", meaning: "Tịch thu", phrase: "The guard will confiscate your water bottles.", category: "general" },
            { word: "Mechanical breakdown", type: "phrase/idiom", meaning: "Sự cố cơ học", phrase: "The flight was delayed due to a mechanical breakdown.", category: "general" },
            { word: "Flat tire", type: "phrase/idiom", meaning: "Xì lốp", phrase: "We had a flat tire and had to fix it by the road.", category: "general" },
            { word: "GetÝng towed for parking illegally", type: "phrase/idiom", meaning: "Bị kéo vì đậu xe trái phép", phrase: "", category: "general" },
            { word: "Get lost", type: "phrase/idiom", meaning: "Lạc", phrase: "If you don't use a map, you might get lost.", category: "general" },
            { word: "TrafÏc jams", type: "phrase/idiom", meaning: "Tắc đường", phrase: "", category: "general" },
            { word: "Passport", type: "vocab", meaning: "Hộ chiếu", phrase: "You must show your passport at the border.", category: "general" },
            { word: "Boarding pass", type: "phrase/idiom", meaning: "Vé tàu, vé máy bay", phrase: "Print your boarding pass before you go to the gate.", category: "general" },
            { word: "The front desk", type: "phrase/idiom", meaning: "Quầy lễ tân", phrase: "Leave your keys at the front desk of the hotel.", category: "general" },
            { word: "Downstairs", type: "vocab", meaning: "Tầng dưới", phrase: "The dining room is located downstairs.", category: "general" },
            { word: "Distinctly", type: "vocab", meaning: "Rõ ràng", phrase: "I distinctly remember telling you to lock the door.", category: "general" },
            { word: "Slammed", type: "vocab", meaning: "Đóng sầm lại", phrase: "He slammed the door shut when he was angry.", category: "general" },
            { word: "Rushing", type: "vocab", meaning: "Gấp gáp", phrase: "There is no need for rushing; we have plenty of time.", category: "general" },
            { word: "I’m drawing a blank", type: "phrase/idiom", meaning: "Tôi không thể nhớ", phrase: "I try to remember his name, but I'm drawing a blank.", category: "general" },
            { word: "It’s a safe bet", type: "phrase/idiom", meaning: "Nó rất có thể", phrase: "It's a safe bet that it will rain tomorrow.", category: "general" },
            { word: "The way i see it", type: "phrase/idiom", meaning: "Theo ý kiến của tôi", phrase: "The way I see it, we have no other choice.", category: "general" },
            { word: "I’m toast", type: "phrase/idiom", meaning: "Tôi có rắc rối lớn", phrase: "If my mom finds out I broke the TV, I'm toast.", category: "general" },
            { word: "You will cross that bridge when you come to it", type: "phrase/idiom", meaning: "Hãy lo lắng về nó sau", phrase: "Don't worry about the final exam yet; cross that bridge when you come to it.", category: "general" },
            { word: "I’m off", type: "phrase/idiom", meaning: "Giờ tôi sẽ rời đi", phrase: "Well, it's late. I'm off to bed.", category: "general" },
            { word: "Perfume", type: "vocab", meaning: "Nước hoa", phrase: "She's wearing a very strong perfume.", category: "general" },
            { word: "Depart", type: "vocab", meaning: "Khởi hành", phrase: "The train will depart from platform 3.", category: "general" },
            { word: "Lull", type: "vocab", meaning: "Ru ngủ", phrase: "There was a short lull in the storm before it started raining again.", category: "general" },
            { word: "Downside", type: "vocab", meaning: "Nhược điểm", phrase: "The only downside to this phone is its poor battery life.", category: "general" },
            { word: "Access", type: "vocab", meaning: "Truy cập", phrase: "You need a password to access this computer.", category: "general" },
            { word: "Pattern", type: "vocab", meaning: "Kiểu", phrase: "This dress has a beautiful floral pattern.", category: "general" },
            { word: "Fraud alert", type: "phrase/idiom", meaning: "Cảnh báo gian lận", phrase: "I received a fraud alert on my credit card app.", category: "general" },
            { word: "Impersonate", type: "vocab", meaning: "Mạo danh", phrase: "It is illegal to impersonate a police officer.", category: "general" },
            { word: "Scenario", type: "vocab", meaning: "Kịch bản", phrase: "Let's imagine a scenario where we win the lottery.", category: "general" },
            { word: "Encryption", type: "vocab", meaning: "Mã hóa", phrase: "The website uses encryption to protect your data.", category: "general" },
            { word: "Unintelligible", type: "vocab", meaning: "Khó hiểu", phrase: "The writing on the old letter was completely unintelligible.", category: "general" },
            { word: "Wireless", type: "vocab", meaning: "Không dây", phrase: "We use a wireless network at home.", category: "general" },
            { word: "Hotspot", type: "vocab", meaning: "Điểm phát sóng", phrase: "You can connect to the Wi-Fi hotspot in the cafe.", category: "general" },
            { word: "Credential", type: "vocab", meaning: "Chứng chỉ, thông tin xác thực", phrase: "Please enter your login credential to proceed.", category: "general" }
        ];
const categoryLabels = { general: { label: "Từ vựng chung", class: "cat-goals" } };
let learnedWords=JSON.parse(localStorage.getItem('lv6unit6Learned')||'[]');let currentFilter='all';
function speakWord(w,b){window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(w);u.lang='en-US';u.rate=0.85;const v=window.speechSynthesis.getVoices();const e=v.find(x=>x.lang.startsWith('en'));if(e)u.voice=e;b.classList.add('speaking');u.onend=()=>b.classList.remove('speaking');u.onerror=()=>b.classList.remove('speaking');window.speechSynthesis.speak(u);}
function speakPhrase(h,b){const d=document.createElement('div');d.innerHTML=h;speakWord(d.textContent||d.innerText,b);}
if(window.speechSynthesis.onvoiceschanged!==undefined)window.speechSynthesis.onvoiceschanged=()=>{};
function renderCards(f='all',s=''){const g=document.getElementById('vocabGrid');g.innerHTML='';let d=vocabularyData;if(f!=='all')d=d.filter(v=>v.category===f);if(s){const q=s.toLowerCase();d=d.filter(v=>v.word.toLowerCase().includes(q)||v.meaning.toLowerCase().includes(q));}d.forEach(v=>{const c=categoryLabels[v.category];const il=learnedWords.includes(v.word);const card=document.createElement('div');card.className=`vocab-card ${il?'learned':''}`;card.style.opacity=il?'0.7':'1';const pe=v.phrase.replace(/'/g,"\\'");card.innerHTML=`<span class="category-tag ${c.class}">${c.label}</span><div class="word"><button class="speak-btn" onclick="event.stopPropagation();speakWord('${v.word.replace(/'/g,"\\'")}',this)">🔊</button><span>${il?'✅ ':''}${v.word}</span></div><span class="type">${v.type}</span><div class="meaning">${v.meaning}</div><div class="phrase"><div class="phrase-header"><button class="speak-btn" onclick="event.stopPropagation();speakPhrase('${pe}',this)">🔊</button><span class="phrase-label">Example:</span></div><p class="phrase-text">${v.phrase}</p></div>`;card.addEventListener('click',()=>card.classList.toggle('expanded'));card.addEventListener('dblclick',()=>toggleLearned(v.word));g.appendChild(card);});updateProgress();}
function toggleLearned(w){if(learnedWords.includes(w))learnedWords=learnedWords.filter(x=>x!==w);else learnedWords.push(w);localStorage.setItem('lv6unit6Learned',JSON.stringify(learnedWords));renderCards(currentFilter,document.getElementById('searchInput').value);}
function updateProgress(){const t=vocabularyData.length,l=learnedWords.length,p=Math.round((l/t)*100);document.getElementById('learnedWords').textContent=l;document.getElementById('totalWords').textContent=t;document.getElementById('progressFill').style.width=p+'%';document.getElementById('progressText').textContent=p+'%';}
document.querySelectorAll('.filter-btn').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');currentFilter=b.dataset.filter;renderCards(currentFilter,document.getElementById('searchInput').value);});});
document.getElementById('searchInput').addEventListener('input',e=>renderCards(currentFilter,e.target.value));
renderCards();
</script>
</body>
</html>
