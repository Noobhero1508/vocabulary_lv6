<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit 4 - Getting Along with Others</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--primary:#10b981;--secondary:#14b8a6;--dark:#1e1b4b}*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Outfit',sans-serif;background:linear-gradient(135deg,#10b981 0%,#14b8a6 100%);min-height:100vh;padding:20px}.container{max-width:1400px;margin:0 auto}.back-btn{display:inline-flex;align-items:center;gap:8px;color:rgba(255,255,255,0.8);text-decoration:none;font-size:0.9rem;padding:8px 16px;border-radius:20px;background:rgba(255,255,255,0.15);transition:all 0.3s;margin-bottom:15px}.back-btn:hover{background:rgba(255,255,255,0.3);transform:translateX(-3px)}header{text-align:center;padding:30px 20px;color:white}header h1{font-size:2.5rem;text-shadow:2px 2px 10px rgba(0,0,0,0.3);margin-bottom:8px}header p{font-size:1.1rem;opacity:0.9}.stats{display:flex;justify-content:center;gap:20px;margin:20px 0;flex-wrap:wrap}.stat-card{background:rgba(255,255,255,0.2);backdrop-filter:blur(10px);padding:15px 30px;border-radius:16px;text-align:center;color:white}.stat-card h3{font-size:2rem}.stat-card p{opacity:0.8;font-size:0.85rem}.progress-bar{width:100%;max-width:500px;height:8px;background:rgba(255,255,255,0.3);border-radius:10px;margin:15px auto;overflow:hidden}.progress-fill{height:100%;background:linear-gradient(90deg,#f59e0b,#fbbf24);border-radius:10px;width:0%;transition:width 0.5s ease}.learned-count{text-align:center;color:white;margin-bottom:15px;font-size:0.9rem}.search-box{display:flex;justify-content:center;margin-bottom:15px}.search-box input{width:100%;max-width:500px;padding:12px 22px;border:none;border-radius:50px;font-size:1rem;box-shadow:0 5px 20px rgba(0,0,0,0.1);font-family:inherit}.search-box input:focus{outline:3px solid var(--primary)}.filter-tabs{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin:20px 0}.filter-btn{padding:10px 20px;border:none;border-radius:25px;background:rgba(255,255,255,0.2);color:white;cursor:pointer;transition:all 0.3s;font-family:inherit;font-size:0.9rem}.filter-btn:hover,.filter-btn.active{background:white;color:var(--primary);transform:translateY(-2px)}.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px;margin-top:20px}.vocab-card{background:white;border-radius:18px;padding:22px;box-shadow:0 8px 30px rgba(0,0,0,0.1);transition:all 0.3s ease;cursor:pointer;position:relative;overflow:hidden}.vocab-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:linear-gradient(180deg,var(--primary),var(--secondary))}.vocab-card:hover{transform:translateY(-4px);box-shadow:0 15px 40px rgba(0,0,0,0.15)}.vocab-card .word{font-size:1.3rem;font-weight:700;color:var(--dark);margin-bottom:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}.speak-btn{background:linear-gradient(135deg,var(--primary),var(--secondary));border:none;color:white;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all 0.3s ease;flex-shrink:0}.speak-btn:hover{transform:scale(1.15)}.speak-btn.speaking{animation:pulse 0.8s infinite;background:linear-gradient(135deg,#f59e0b,#fbbf24)}@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}.vocab-card .type{display:inline-block;font-size:0.7rem;color:#94a3b8;font-style:italic;margin-bottom:4px}.vocab-card .meaning{color:var(--primary);font-weight:500;margin-bottom:4px}.vocab-card .phrase{background:linear-gradient(135deg,#ecfdf5,#d1fae5);padding:12px;border-radius:10px;font-size:0.9rem;line-height:1.6;color:#334155;display:none}.vocab-card.expanded .phrase{display:block;animation:fadeIn 0.3s ease}.phrase-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}.phrase-header .speak-btn{width:26px;height:26px;font-size:11px}.phrase-label{font-weight:600;color:var(--primary);font-size:0.8rem}.phrase-text{margin:0}.category-tag{display:inline-block;padding:3px 10px;border-radius:15px;font-size:0.7rem;margin-bottom:8px;font-weight:500}.cat-anger{background:#fee2e2;color:#dc2626}.cat-managing{background:#dbeafe;color:#2563eb}.cat-friendship{background:#d1fae5;color:#059669}.cat-personality{background:#fef3c7;color:#d97706}@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}footer{text-align:center;padding:30px;color:white;opacity:0.8;font-size:0.9rem}@media(max-width:768px){header h1{font-size:1.8rem}.vocab-grid{grid-template-columns:1fr}.stats{flex-direction:column;align-items:center}}
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-btn">← Quay lại</a>
    <header><h1>😊 Unit 4: Getting Along with Others</h1><p>Click thẻ để xem giải thích, double-click để đánh dấu đã học</p></header>
    <div class="stats"><div class="stat-card"><h3 id="totalWords">0</h3><p>Tổng từ</p></div><div class="stat-card"><h3 id="learnedWords">0</h3><p>Đã học</p></div><div class="stat-card"><h3>1</h3><p>Nhóm</p></div></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <p class="learned-count">Tiến độ: <span id="progressText">0%</span></p>
    <div class="search-box"><input type="text" id="searchInput" placeholder="🔍 Tìm kiếm..."></div>
    
    <div class="vocab-grid" id="vocabGrid"></div>
    <footer><p>💡 Double-click để đánh dấu đã học</p></footer>
</div>
<script>
const vocabularyData=[
{word:"ballistic",type:"adj/noun",meaning:"giận dữ (phát điên)",phrase:"Suddenly becoming very angry.",category:"anger"},
{word:"bring it up",type:"idiom",meaning:"thảo luận, đề cập",phrase:"To start talking about a subject.",category:"managing"},
{word:"calm down",type:"phrasal verb",meaning:"bình tĩnh",phrase:"To stop feeling angry, excited, or nervous.",category:"managing"},
{word:"cheer you on",type:"phrase",meaning:"ủng hộ",phrase:"To shout loudly to encourage someone.",category:"friendship"},
{word:"controlling",type:"adjective",meaning:"hay kiểm soát người khác",phrase:"Always trying to make people do what you want.",category:"personality"},
{word:"controlling anger",type:"phrase",meaning:"kiềm chế cơn giận",phrase:"Managing your feeling of being very annoyed.",category:"managing"},
{word:"count on people",type:"phrase",meaning:"tin tưởng",phrase:"To trust someone to help you.",category:"friendship"},
{word:"have a fit",type:"idiom",meaning:"nổi cơn thịnh nộ",phrase:"To become very angry and upset.",category:"anger"},
{word:"hit the roof",type:"phrase",meaning:"giận dữ",phrase:"To become extremely angry.",category:"anger"},
{word:"hold it in / keep it inside",type:"phrase",meaning:"giữ bên trong, không bày tỏ",phrase:"To not express your feelings.",category:"managing"},
{word:"hot-tempered",type:"adjective",meaning:"nóng tính",phrase:"Getting angry very easily.",category:"personality"},
{word:"keep things bottled up inside",type:"phrase",meaning:"kìm nén cảm xúc",phrase:"To hide your emotions instead of showing them.",category:"managing"},
{word:"let it go / shrug it off",type:"phrase",meaning:"phớt lờ, bỏ qua",phrase:"To stop worrying or being angry about something.",category:"managing"},
{word:"let off steam",type:"phrase",meaning:"xả stress, hạ hỏa",phrase:"To do something that helps you get rid of strong feelings.",category:"managing"},
{word:"let you have it",type:"idiom",meaning:"tấn công/chỉ trích ai đó",phrase:"To attack or criticize someone strongly.",category:"anger"},
{word:"lose one's temper",type:"phrase",meaning:"mất bình tĩnh, nổi nóng",phrase:"To suddenly become very angry.",category:"anger"},
{word:"lose your cool",type:"idiom",meaning:"mất bình tĩnh",phrase:"To suddenly become angry.",category:"anger"},
{word:"make a big issue out of",type:"idiom",meaning:"chuyện bé xé to",phrase:"To make a small problem seem very important.",category:"anger"},
{word:"make s.o tick",type:"phrase",meaning:"hiểu điều gì thúc đẩy ai đó",phrase:"To understand how someone thinks and why they behave that way.",category:"personality"},
{word:"oversensitive",type:"adjective",meaning:"quá nhạy cảm",phrase:"Easily upset or offended.",category:"personality"},
{word:"perfectionist",type:"noun/adj",meaning:"cầu toàn",phrase:"Someone who wants everything to be perfect.",category:"personality"},
{word:"pick up the pieces",type:"idiom",meaning:"hàn gắn, khắc phục hậu quả",phrase:"To try to return to normal after a disaster or difficult time.",category:"managing"},
{word:"procrastinator",type:"noun",meaning:"người trì hoãn",phrase:"A person who delays doing things until the last minute.",category:"personality"},
{word:"set you off",type:"idiom",meaning:"khiến bạn bắt đầu (cười/khóc)",phrase:"To cause you to start laughing, crying, or getting angry.",category:"anger"},
{word:"shortcoming",type:"noun",meaning:"khuyết điểm",phrase:"A fault or a failure to reach a good standard.",category:"personality"},
{word:"stand the test of time",type:"phrase",meaning:"vượt qua thử thách thời gian",phrase:"To continue to be good or useful for a long period.",category:"friendship"},
{word:"stick by you",type:"phrase",meaning:"luôn trung thành, ở bên cạnh",phrase:"To continue to support someone when they have problems.",category:"friendship"},
{word:"stick up for you",type:"phrase",meaning:"bảo vệ bạn khỏi chỉ trích",phrase:"To defend someone who is being criticized.",category:"friendship"},
{word:"take it out on",type:"idiom",meaning:"giận cá chém thớt",phrase:"To treat someone badly because you are angry, even though it is not their fault.",category:"anger"},
{word:"take it well",type:"idiom",meaning:"đón nhận nhẹ nhàng",phrase:"To not be angry or upset when something bad happens.",category:"managing"},
{word:"tell s.o off",type:"idiom",meaning:"rầy la",phrase:"To speak very angrily to someone because they did something wrong.",category:"anger"},
{word:"through thick and thin",type:"idiom",meaning:"vượt qua mọi thăng trầm",phrase:"Even when there are problems or difficulties.",category:"friendship"},
{word:"times are tough",type:"idiom",meaning:"thời kỳ khó khăn",phrase:"Things are difficult right now.",category:"friendship"},
{word:"vent",type:"verb",meaning:"trút nỗi giận dữ",phrase:"To express a negative emotion strongly.",category:"managing"},
{word:"walk on eggshells",type:"idiom",meaning:"cẩn thận không làm ai giận",phrase:"To be very careful not to offend someone.",category:"personality"}
];
const categoryLabels={anger:{label:"Giận dữ",class:"cat-anger"},managing:{label:"Quản lý cảm xúc",class:"cat-managing"},friendship:{label:"Tình bạn",class:"cat-friendship"},personality:{label:"Tính cách",class:"cat-personality"}};
let learnedWords=JSON.parse(localStorage.getItem('lv6unit4Learned')||'[]');let currentFilter='all';
function speakWord(w,b){window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(w);u.lang='en-US';u.rate=0.85;const v=window.speechSynthesis.getVoices();const e=v.find(x=>x.lang.startsWith('en'));if(e)u.voice=e;b.classList.add('speaking');u.onend=()=>b.classList.remove('speaking');u.onerror=()=>b.classList.remove('speaking');window.speechSynthesis.speak(u);}
function speakPhrase(h,b){const d=document.createElement('div');d.innerHTML=h;speakWord(d.textContent||d.innerText,b);}
if(window.speechSynthesis.onvoiceschanged!==undefined)window.speechSynthesis.onvoiceschanged=()=>{};
function renderCards(f='all',s=''){const g=document.getElementById('vocabGrid');g.innerHTML='';let d=vocabularyData;if(f!=='all')d=d.filter(v=>v.category===f);if(s){const q=s.toLowerCase();d=d.filter(v=>v.word.toLowerCase().includes(q)||v.meaning.toLowerCase().includes(q));}d.forEach(v=>{const c=categoryLabels[v.category];const il=learnedWords.includes(v.word);const card=document.createElement('div');card.className=`vocab-card ${il?'learned':''}`;card.style.opacity=il?'0.7':'1';const pe=v.phrase.replace(/'/g,"\\'");card.innerHTML=`<span class="category-tag ${c.class}">${c.label}</span><div class="word"><button class="speak-btn" onclick="event.stopPropagation();speakWord('${v.word.replace(/'/g,"\\'")}',this)">🔊</button><span>${il?'✅ ':''}${v.word}</span></div><span class="type">${v.type}</span><div class="meaning">${v.meaning}</div><div class="phrase"><div class="phrase-header"><button class="speak-btn" onclick="event.stopPropagation();speakPhrase('${pe}',this)">🔊</button><span class="phrase-label">Example:</span></div><p class="phrase-text">${v.phrase}</p></div>`;card.addEventListener('click',()=>card.classList.toggle('expanded'));card.addEventListener('dblclick',()=>toggleLearned(v.word));g.appendChild(card);});updateProgress();}
function toggleLearned(w){if(learnedWords.includes(w))learnedWords=learnedWords.filter(x=>x!==w);else learnedWords.push(w);localStorage.setItem('lv6unit4Learned',JSON.stringify(learnedWords));renderCards(currentFilter,document.getElementById('searchInput').value);}
function updateProgress(){const t=vocabularyData.length,l=learnedWords.length,p=Math.round((l/t)*100);document.getElementById('learnedWords').textContent=l;document.getElementById('totalWords').textContent=t;document.getElementById('progressFill').style.width=p+'%';document.getElementById('progressText').textContent=p+'%';}
document.querySelectorAll('.filter-btn').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');currentFilter=b.dataset.filter;renderCards(currentFilter,document.getElementById('searchInput').value);});});
document.getElementById('searchInput').addEventListener('input',e=>renderCards(currentFilter,e.target.value));
renderCards();
</script>
</body>
</html>
