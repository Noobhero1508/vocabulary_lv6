<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit 9 - What Lies Ahead?</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--primary:#ea580c;--secondary:#dc2626;--dark:#1e1b4b}*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Outfit',sans-serif;background:linear-gradient(135deg,#ea580c 0%,#dc2626 100%);min-height:100vh;padding:20px}.container{max-width:1400px;margin:0 auto}.back-btn{display:inline-flex;align-items:center;gap:8px;color:rgba(255,255,255,0.8);text-decoration:none;font-size:0.9rem;padding:8px 16px;border-radius:20px;background:rgba(255,255,255,0.15);transition:all 0.3s;margin-bottom:15px}.back-btn:hover{background:rgba(255,255,255,0.3);transform:translateX(-3px)}header{text-align:center;padding:30px 20px;color:white}header h1{font-size:2.5rem;text-shadow:2px 2px 10px rgba(0,0,0,0.3);margin-bottom:8px}header p{font-size:1.1rem;opacity:0.9}.stats{display:flex;justify-content:center;gap:20px;margin:20px 0;flex-wrap:wrap}.stat-card{background:rgba(255,255,255,0.2);backdrop-filter:blur(10px);padding:15px 30px;border-radius:16px;text-align:center;color:white}.stat-card h3{font-size:2rem}.stat-card p{opacity:0.8;font-size:0.85rem}.progress-bar{width:100%;max-width:500px;height:8px;background:rgba(255,255,255,0.3);border-radius:10px;margin:15px auto;overflow:hidden}.progress-fill{height:100%;background:linear-gradient(90deg,#10b981,#34d399);border-radius:10px;width:0%;transition:width 0.5s ease}.learned-count{text-align:center;color:white;margin-bottom:15px;font-size:0.9rem}.search-box{display:flex;justify-content:center;margin-bottom:15px}.search-box input{width:100%;max-width:500px;padding:12px 22px;border:none;border-radius:50px;font-size:1rem;box-shadow:0 5px 20px rgba(0,0,0,0.1);font-family:inherit}.search-box input:focus{outline:3px solid var(--primary)}.filter-tabs{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin:20px 0}.filter-btn{padding:10px 20px;border:none;border-radius:25px;background:rgba(255,255,255,0.2);color:white;cursor:pointer;transition:all 0.3s;font-family:inherit;font-size:0.9rem}.filter-btn:hover,.filter-btn.active{background:white;color:var(--primary);transform:translateY(-2px)}.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px;margin-top:20px}.vocab-card{background:white;border-radius:18px;padding:22px;box-shadow:0 8px 30px rgba(0,0,0,0.1);transition:all 0.3s ease;cursor:pointer;position:relative;overflow:hidden}.vocab-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:linear-gradient(180deg,var(--primary),var(--secondary))}.vocab-card:hover{transform:translateY(-4px);box-shadow:0 15px 40px rgba(0,0,0,0.15)}.vocab-card .word{font-size:1.3rem;font-weight:700;color:var(--dark);margin-bottom:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}.speak-btn{background:linear-gradient(135deg,var(--primary),var(--secondary));border:none;color:white;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all 0.3s ease;flex-shrink:0}.speak-btn:hover{transform:scale(1.15)}.speak-btn.speaking{animation:pulse 0.8s infinite;background:linear-gradient(135deg,#10b981,#34d399)}@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}.vocab-card .type{display:inline-block;font-size:0.7rem;color:#94a3b8;font-style:italic;margin-bottom:4px}.vocab-card .meaning{color:var(--primary);font-weight:500;margin-bottom:4px}.vocab-card .phrase{background:linear-gradient(135deg,#fff7ed,#ffedd5);padding:12px;border-radius:10px;font-size:0.9rem;line-height:1.6;color:#334155;display:none}.vocab-card.expanded .phrase{display:block;animation:fadeIn 0.3s ease}.phrase-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}.phrase-header .speak-btn{width:26px;height:26px;font-size:11px}.phrase-label{font-weight:600;color:var(--primary);font-size:0.8rem}.phrase-text{margin:0}.category-tag{display:inline-block;padding:3px 10px;border-radius:15px;font-size:0.7rem;margin-bottom:8px;font-weight:500}.cat-technology{background:#f3e8ff;color:#9333ea}.cat-demographics{background:#dbeafe;color:#2563eb}.cat-nature{background:#d1fae5;color:#059669}.cat-idioms{background:#fef3c7;color:#d97706}@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}footer{text-align:center;padding:30px;color:white;opacity:0.8;font-size:0.9rem}@media(max-width:768px){header h1{font-size:1.8rem}.vocab-grid{grid-template-columns:1fr}.stats{flex-direction:column;align-items:center}}
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-btn">← Quay lại</a>
    <header><h1>🚀 Unit 9: What Lies Ahead?</h1><p>Click thẻ để xem giải thích, double-click để đánh dấu đã học</p></header>
    <div class="stats"><div class="stat-card"><h3 id="totalWords">0</h3><p>Tổng từ</p></div><div class="stat-card"><h3 id="learnedWords">0</h3><p>Đã học</p></div><div class="stat-card"><h3>1</h3><p>Nhóm</p></div></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <p class="learned-count">Tiến độ: <span id="progressText">0%</span></p>
    <div class="search-box"><input type="text" id="searchInput" placeholder="🔍 Tìm kiếm..."></div>
    
    <div class="vocab-grid" id="vocabGrid"></div>
    <footer><p>💡 Double-click để đánh dấu đã học</p></footer>
</div>
<script>
const vocabularyData=[
{word:"a tiny computer chip",type:"phrase",meaning:"vi mạch máy tính nhỏ",phrase:"A very small piece of material inside a computer that stores information.",category:"technology"},
{word:"absorb",type:"verb",meaning:"hấp thụ",phrase:"To take in liquid, gas, or heat.",category:"nature"},
{word:"artificial intelligence",type:"phrase",meaning:"trí tuệ nhân tạo",phrase:"Computer systems that can think and learn like humans.",category:"technology"},
{word:"be catching on",type:"phrase",meaning:"trở nên phổ biến",phrase:"To become popular or fashionable.",category:"idioms"},
{word:"birthrate",type:"noun",meaning:"tỷ lệ sinh",phrase:"The number of babies born in a place during a specific time.",category:"demographics"},
{word:"cedar",type:"noun",meaning:"cây tuyết tùng",phrase:"A type of tall evergreen tree with sweet-smelling wood.",category:"nature"},
{word:"cloning",type:"noun",meaning:"nhân bản vô tính",phrase:"The process of making an exact genetic copy of an animal or plant.",category:"technology"},
{word:"come to think of it",type:"idiom",meaning:"nghĩ kỹ thì",phrase:"An expression used when you suddenly realize or remember something.",category:"idioms"},
{word:"computer chip implants",type:"phrase",meaning:"cấy ghép chip",phrase:"Tiny electronic devices put inside the body.",category:"technology"},
{word:"crime rate",type:"compound noun",meaning:"tỷ lệ tội phạm",phrase:"The number of crimes that happen in a particular area.",category:"demographics"},
{word:"divorce rate",type:"compound noun",meaning:"tỷ lệ ly hôn",phrase:"The number of marriages that end in divorce during a specific time.",category:"demographics"},
{word:"dramatically",type:"adverb",meaning:"đáng kể, đột ngột",phrase:"In a great and sudden way.",category:"idioms"},
{word:"fertility rate",type:"compound noun",meaning:"tỷ lệ sinh sản",phrase:"The average number of children born to a woman.",category:"demographics"},
{word:"genetic engineering",type:"phrase",meaning:"kỹ thuật di truyền",phrase:"Changing the genes of a living thing to make it healthier.",category:"technology"},
{word:"It isn't a question of if but when",type:"idiom",meaning:"vấn đề chỉ là thời gian",phrase:"It is certain to happen, we just don't know exactly when.",category:"idioms"},
{word:"It'll open a can of worms",type:"idiom",meaning:"rước họa vào thân",phrase:"It will create a lot of new problems.",category:"idioms"},
{word:"It's just scratching the surface",type:"idiom",meaning:"mới chỉ là bề nổi",phrase:"It is only dealing with a very small part of a big problem.",category:"idioms"},
{word:"life expectancy",type:"compound noun",meaning:"tuổi thọ trung bình",phrase:"The number of years a person is expected to live.",category:"demographics"},
{word:"literacy rate",type:"compound noun",meaning:"tỷ lệ biết chữ",phrase:"The percentage of people who are able to read and write.",category:"demographics"},
{word:"marriage trend",type:"compound noun",meaning:"xu hướng kết hôn",phrase:"The general direction of how people are marrying now.",category:"demographics"},
{word:"mortality rate",type:"compound noun",meaning:"tỷ lệ tử vong",phrase:"The number of deaths in a particular area.",category:"demographics"},
{word:"nanotechnology",type:"noun",meaning:"công nghệ nano",phrase:"Science that works with extremely small things.",category:"technology"},
{word:"native",type:"noun/adj",meaning:"bản xứ, địa phương",phrase:"Connected with the place where you were born.",category:"nature"},
{word:"oak",type:"noun",meaning:"cây sồi",phrase:"A large tree that produces acorns and strong wood.",category:"nature"},
{word:"redwood",type:"noun",meaning:"cây gỗ đỏ",phrase:"A very tall type of tree that grows in California.",category:"nature"},
{word:"remote surgery",type:"noun phrase",meaning:"phẫu thuật từ xa",phrase:"An operation done by a doctor using a machine from far away.",category:"technology"},
{word:"sequoia",type:"noun",meaning:"cây cự sam",phrase:"A huge evergreen tree.",category:"nature"},
{word:"the bad outweighs the good",type:"idiom",meaning:"hại nhiều hơn lợi",phrase:"There are more disadvantages than advantages.",category:"idioms"},
{word:"turn things around",type:"idiom",meaning:"xoay chuyển tình thế",phrase:"To change an unsuccessful situation into a successful one.",category:"idioms"},
{word:"unemployment rate",type:"compound noun",meaning:"tỷ lệ thất nghiệp",phrase:"The percentage of people who do not have a job.",category:"demographics"},
{word:"unregulated",type:"adjective",meaning:"không được kiểm soát",phrase:"Not controlled by rules or laws.",category:"technology"},
{word:"virtual reality",type:"noun phrase",meaning:"thực tế ảo",phrase:"Images and sounds produced by a computer that seem real.",category:"technology"}
];
const categoryLabels={technology:{label:"Công nghệ",class:"cat-technology"},demographics:{label:"Nhân khẩu",class:"cat-demographics"},nature:{label:"Tự nhiên",class:"cat-nature"},idioms:{label:"Thành ngữ",class:"cat-idioms"}};
let learnedWords=JSON.parse(localStorage.getItem('lv6unit9Learned')||'[]');let currentFilter='all';
function speakWord(w,b){window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(w);u.lang='en-US';u.rate=0.85;const v=window.speechSynthesis.getVoices();const e=v.find(x=>x.lang.startsWith('en'));if(e)u.voice=e;b.classList.add('speaking');u.onend=()=>b.classList.remove('speaking');u.onerror=()=>b.classList.remove('speaking');window.speechSynthesis.speak(u);}
function speakPhrase(h,b){const d=document.createElement('div');d.innerHTML=h;speakWord(d.textContent||d.innerText,b);}
if(window.speechSynthesis.onvoiceschanged!==undefined)window.speechSynthesis.onvoiceschanged=()=>{};
function renderCards(f='all',s=''){const g=document.getElementById('vocabGrid');g.innerHTML='';let d=vocabularyData;if(f!=='all')d=d.filter(v=>v.category===f);if(s){const q=s.toLowerCase();d=d.filter(v=>v.word.toLowerCase().includes(q)||v.meaning.toLowerCase().includes(q));}d.forEach(v=>{const c=categoryLabels[v.category];const il=learnedWords.includes(v.word);const card=document.createElement('div');card.className=`vocab-card ${il?'learned':''}`;card.style.opacity=il?'0.7':'1';const pe=v.phrase.replace(/'/g,"\\'");card.innerHTML=`<span class="category-tag ${c.class}">${c.label}</span><div class="word"><button class="speak-btn" onclick="event.stopPropagation();speakWord('${v.word.replace(/'/g,"\\'")}',this)">🔊</button><span>${il?'✅ ':''}${v.word}</span></div><span class="type">${v.type}</span><div class="meaning">${v.meaning}</div><div class="phrase"><div class="phrase-header"><button class="speak-btn" onclick="event.stopPropagation();speakPhrase('${pe}',this)">🔊</button><span class="phrase-label">Example:</span></div><p class="phrase-text">${v.phrase}</p></div>`;card.addEventListener('click',()=>card.classList.toggle('expanded'));card.addEventListener('dblclick',()=>toggleLearned(v.word));g.appendChild(card);});updateProgress();}
function toggleLearned(w){if(learnedWords.includes(w))learnedWords=learnedWords.filter(x=>x!==w);else learnedWords.push(w);localStorage.setItem('lv6unit9Learned',JSON.stringify(learnedWords));renderCards(currentFilter,document.getElementById('searchInput').value);}
function updateProgress(){const t=vocabularyData.length,l=learnedWords.length,p=Math.round((l/t)*100);document.getElementById('learnedWords').textContent=l;document.getElementById('totalWords').textContent=t;document.getElementById('progressFill').style.width=p+'%';document.getElementById('progressText').textContent=p+'%';}
document.querySelectorAll('.filter-btn').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');currentFilter=b.dataset.filter;renderCards(currentFilter,document.getElementById('searchInput').value);});});
document.getElementById('searchInput').addEventListener('input',e=>renderCards(currentFilter,e.target.value));
renderCards();
</script>
</body>
</html>
