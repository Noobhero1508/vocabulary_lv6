<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit 10 - An Interconnected World</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--primary:#0891b2;--secondary:#2563eb;--dark:#1e1b4b}*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Outfit',sans-serif;background:linear-gradient(135deg,#0891b2 0%,#2563eb 100%);min-height:100vh;padding:20px}.container{max-width:1400px;margin:0 auto}.back-btn{display:inline-flex;align-items:center;gap:8px;color:rgba(255,255,255,0.8);text-decoration:none;font-size:0.9rem;padding:8px 16px;border-radius:20px;background:rgba(255,255,255,0.15);transition:all 0.3s;margin-bottom:15px}.back-btn:hover{background:rgba(255,255,255,0.3);transform:translateX(-3px)}header{text-align:center;padding:30px 20px;color:white}header h1{font-size:2.5rem;text-shadow:2px 2px 10px rgba(0,0,0,0.3);margin-bottom:8px}header p{font-size:1.1rem;opacity:0.9}.stats{display:flex;justify-content:center;gap:20px;margin:20px 0;flex-wrap:wrap}.stat-card{background:rgba(255,255,255,0.2);backdrop-filter:blur(10px);padding:15px 30px;border-radius:16px;text-align:center;color:white}.stat-card h3{font-size:2rem}.stat-card p{opacity:0.8;font-size:0.85rem}.progress-bar{width:100%;max-width:500px;height:8px;background:rgba(255,255,255,0.3);border-radius:10px;margin:15px auto;overflow:hidden}.progress-fill{height:100%;background:linear-gradient(90deg,#10b981,#34d399);border-radius:10px;width:0%;transition:width 0.5s ease}.learned-count{text-align:center;color:white;margin-bottom:15px;font-size:0.9rem}.search-box{display:flex;justify-content:center;margin-bottom:15px}.search-box input{width:100%;max-width:500px;padding:12px 22px;border:none;border-radius:50px;font-size:1rem;box-shadow:0 5px 20px rgba(0,0,0,0.1);font-family:inherit}.search-box input:focus{outline:3px solid var(--primary)}.filter-tabs{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin:20px 0}.filter-btn{padding:10px 20px;border:none;border-radius:25px;background:rgba(255,255,255,0.2);color:white;cursor:pointer;transition:all 0.3s;font-family:inherit;font-size:0.9rem}.filter-btn:hover,.filter-btn.active{background:white;color:var(--primary);transform:translateY(-2px)}.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px;margin-top:20px}.vocab-card{background:white;border-radius:18px;padding:22px;box-shadow:0 8px 30px rgba(0,0,0,0.1);transition:all 0.3s ease;cursor:pointer;position:relative;overflow:hidden}.vocab-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:linear-gradient(180deg,var(--primary),var(--secondary))}.vocab-card:hover{transform:translateY(-4px);box-shadow:0 15px 40px rgba(0,0,0,0.15)}.vocab-card .word{font-size:1.3rem;font-weight:700;color:var(--dark);margin-bottom:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}.speak-btn{background:linear-gradient(135deg,var(--primary),var(--secondary));border:none;color:white;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all 0.3s ease;flex-shrink:0}.speak-btn:hover{transform:scale(1.15)}.speak-btn.speaking{animation:pulse 0.8s infinite;background:linear-gradient(135deg,#10b981,#34d399)}@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}.vocab-card .type{display:inline-block;font-size:0.7rem;color:#94a3b8;font-style:italic;margin-bottom:4px}.vocab-card .meaning{color:var(--primary);font-weight:500;margin-bottom:4px}.vocab-card .phrase{background:linear-gradient(135deg,#ecfeff,#cffafe);padding:12px;border-radius:10px;font-size:0.9rem;line-height:1.6;color:#334155;display:none}.vocab-card.expanded .phrase{display:block;animation:fadeIn 0.3s ease}.phrase-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}.phrase-header .speak-btn{width:26px;height:26px;font-size:11px}.phrase-label{font-weight:600;color:var(--primary);font-size:0.8rem}.phrase-text{margin:0}.category-tag{display:inline-block;padding:3px 10px;border-radius:15px;font-size:0.7rem;margin-bottom:8px;font-weight:500}.cat-global{background:#dbeafe;color:#2563eb}.cat-phrasal{background:#f3e8ff;color:#9333ea}.cat-culture{background:#d1fae5;color:#059669}.cat-idioms{background:#fef3c7;color:#d97706}@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}footer{text-align:center;padding:30px;color:white;opacity:0.8;font-size:0.9rem}@media(max-width:768px){header h1{font-size:1.8rem}.vocab-grid{grid-template-columns:1fr}.stats{flex-direction:column;align-items:center}}
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-btn">← Quay lại</a>
    <header><h1>🌍 Unit 10: An Interconnected World</h1><p>Click thẻ để xem giải thích, double-click để đánh dấu đã học</p></header>
    <div class="stats"><div class="stat-card"><h3 id="totalWords">0</h3><p>Tổng từ</p></div><div class="stat-card"><h3 id="learnedWords">0</h3><p>Đã học</p></div><div class="stat-card"><h3>1</h3><p>Nhóm</p></div></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <p class="learned-count">Tiến độ: <span id="progressText">0%</span></p>
    <div class="search-box"><input type="text" id="searchInput" placeholder="🔍 Tìm kiếm..."></div>
    
    <div class="vocab-grid" id="vocabGrid"></div>
    <footer><p>💡 Double-click để đánh dấu đã học</p></footer>
</div>
<script>
const vocabularyData = [
            { word: "Approximately", type: "vocab", meaning: "Xấp xỉ", phrase: "The journey will take approximately two hours.", category: "general" },
            { word: "Pros", type: "vocab", meaning: "Ưu điểm", phrase: "What are the pros and cons of moving to a new city?", category: "general" },
            { word: "Cons", type: "vocab", meaning: "Khuyết điểm", phrase: "One of the cons of living here is the heavy traffic.", category: "general" },
            { word: "On the fence = Not able to decide something", type: "phrase/idiom", meaning: "Không thể quyết định một cái gì đó", phrase: "I am still on the fence about which car to buy.", category: "general" },
            { word: "It\'s bad enough that", type: "phrase/idiom", meaning: "Nó đủ tệ mà", phrase: "It's bad enough that we lost, but you don't need to yell at us.", category: "general" },
            { word: "A fish out of water = Everything seems unfamiliar to you", type: "phrase/idiom", meaning: "Mọi thứ dường như xa lạ với bạn", phrase: "As a country boy in the big city, he felt like a fish out of water.", category: "general" },
            { word: "Pulls your leg = He or she is only kidding", type: "phrase/idiom", meaning: "Nói một điều gì đó không có thật như một cách nói đùa", phrase: "Don't believe him; he always pulls your leg.", category: "general" },
            { word: "A losing battle = It\'s probably best to give up", type: "phrase/idiom", meaning: "Có lẽ tốt nhất nên từ bỏ", phrase: "Trying to keep the house clean with four dogs is a losing battle.", category: "general" },
            { word: "Money talks", type: "phrase/idiom", meaning: "Đàm phán tiền bạc", phrase: "In politics, it's often true that money talks.", category: "general" },
            { word: "Proficient", type: "vocab", meaning: "Thành thạo", phrase: "She is proficient in three languages.", category: "general" },
            { word: "Bring about", type: "phrase/idiom", meaning: "Làm cho điều gì đó xảy ra; nguyên nhân để xảy ra hoặc tồn tại", phrase: "The new manager hopes to bring about positive changes.", category: "general" },
            { word: "Carry out", type: "phrase/idiom", meaning: "Đạt được hoặc hoàn thành một kế hoạch hoặc dự án", phrase: "The doctors will carry out some tests to find the problem.", category: "general" },
            { word: "Come down with", type: "phrase/idiom", meaning: "Trở nên bị ốm với một bệnh cụ thể", phrase: "I think I might come down with a cold.", category: "general" },
            { word: "Come up with", type: "phrase/idiom", meaning: "Nghĩ về một cái gì đó chẳng hạn như một ý tưởng hoặc một kế hoạch", phrase: "He tried to come up with a good excuse for being late.", category: "general" },
            { word: "Go without", type: "phrase/idiom", meaning: "Sống mà không cần thứ gì đó bạn cần hoặc thường có:", phrase: "We had to go without water for two days.", category: "general" },
            { word: "Lay off", type: "phrase/idiom", meaning: "Chấm dứt việc làm của người lao động do điều kiện kinh tế", phrase: "The company had to lay off 100 workers.", category: "general" },
            { word: "Put up with", type: "phrase/idiom", meaning: "Chấp nhận một tình huống hoặc một người tồi tệ mà không phàn nàn", phrase: "I can't put up with this noise anymore.", category: "general" },
            { word: "Run out of", type: "phrase/idiom", meaning: "Sử dụng hết thứ gì đó và không còn thứ nào nữa", phrase: "We need to buy milk because we ran out of it.", category: "general" },
            { word: "Wipe out", type: "phrase/idiom", meaning: "Kết thúc hoặc phá hủy hoàn toàn một thứ gì đó vì vậy nó không tồn tại trong một thời gian dài", phrase: "The disease could wipe out the entire animal population.", category: "general" },
            { word: "Refugees", type: "vocab", meaning: "Người tị nạn", phrase: "The camp provided shelter for thousands of refugees.", category: "general" },
            { word: "Terrorist organizations", type: "phrase/idiom", meaning: "Tổ chức khủng bố", phrase: "The government is trying to stop terrorist organizations.", category: "general" },
            { word: "Humanitarian", type: "vocab", meaning: "Nhân đạo", phrase: "The charity provides humanitarian aid to earthquake victims.", category: "general" },
            { word: "Agencies", type: "vocab", meaning: "Cơ quan", phrase: "Several relief agencies are working together here.", category: "general" },
            { word: "Troops", type: "vocab", meaning: "Quân đội", phrase: "The general ordered the troops to march forward.", category: "general" },
            { word: "Settle into", type: "phrase/idiom", meaning: "Định cư", phrase: "It took him a few weeks to settle into his new job.", category: "general" },
            { word: "Vulnerable", type: "vocab", meaning: "Dễ bị tổn thương", phrase: "Newborn animals are weak and vulnerable.", category: "general" },
            { word: "Malnourished", type: "vocab", meaning: "Suy dinh dưỡng", phrase: "The malnourished children urgently need healthy food.", category: "general" },
            { word: "But on the bright side", type: "phrase/idiom", meaning: "Nhưng về mặt sáng", phrase: "My car broke down, but on the bright side, I got some exercise walking.", category: "general" },
            { word: "It just goes to show you", type: "phrase/idiom", meaning: "Nó chỉ cho bạn thấy", phrase: "It just goes to show you that hard work really pays off.", category: "general" },
            { word: "Run into", type: "phrase/idiom", meaning: "Tình cờ gặp ai đó", phrase: "I didn't expect to run into an old friend at the supermarket.", category: "general" },
            { word: "Came across", type: "phrase/idiom", meaning: "Tình cờ bắt gặp cái gì đó", phrase: "I came across my old photos while cleaning the room.", category: "general" },
            { word: "Care for", type: "phrase/idiom", meaning: "Quan tâm", phrase: "Would you care for a cup of tea?", category: "general" },
            { word: "Talk into", type: "phrase/idiom", meaning: "Thuyết phục ai đó", phrase: "He managed to talk me into buying the expensive watch.", category: "general" },
            { word: "Throw away", type: "phrase/idiom", meaning: "Vứt rác", phrase: "Don't throw away those old clothes; donate them.", category: "general" },
            { word: "Try on", type: "phrase/idiom", meaning: "Mặc thử", phrase: "You should try on the shoes before you buy them.", category: "general" },
            { word: "Try out", type: "phrase/idiom", meaning: "Thử nghiệm, sử dụng thứ gì đó xem nó có tốt không", phrase: "Let's try out this new restaurant tonight.", category: "general" },
            { word: "Count on", type: "phrase/idiom", meaning: "Tin tưởng, dựa vào", phrase: "You can always count on me when you need help.", category: "general" },
            { word: "Figure out", type: "phrase/idiom", meaning: "Tìm ra", phrase: "I need to figure out how to solve this math problem.", category: "general" },
            { word: "Gadget", type: "vocab", meaning: "Tiện ích", phrase: "He loves buying every new electronic gadget.", category: "general" },
            { word: "Visible", type: "vocab", meaning: "Dễ thấy", phrase: "The mountains are visible in the distance on a clear day.", category: "general" },
            { word: "Tech-savvy", type: "vocab", meaning: "Am hiểu công nghệ cao", phrase: "My grandfather is surprisingly tech-savvy with his smartphone.", category: "general" },
            { word: "Tremendous", type: "vocab", meaning: "Kinh khủng", phrase: "The explosion made a tremendous noise.", category: "general" },
            { word: "Separable", type: "vocab", meaning: "Tách rời", phrase: "The prefix 'un-' is separable from the root word.", category: "general" },
            { word: "Interconnected", type: "vocab", meaning: "Kết nối với nhau", phrase: "The global economy is deeply interconnected.", category: "general" },
            { word: "Advocates", type: "vocab", meaning: "Những người ủng hộ", phrase: "He strongly advocates for better public transportation.", category: "general" },
            { word: "Instant messaging", type: "phrase/idiom", meaning: "Nhắn tin nhanh", phrase: "We use instant messaging to communicate quickly at work.", category: "general" },
            { word: "Teleconference", type: "vocab", meaning: "Hội nghị từ xa", phrase: "The team had a teleconference with the London office.", category: "general" },
            { word: "Prosperity", type: "vocab", meaning: "Sự phồn vinh", phrase: "We wish you health and prosperity in the new year.", category: "general" },
            { word: "Critics", type: "vocab", meaning: "Phê bình", phrase: "The movie critics gave the film terrible reviews.", category: "general" },
            { word: "Evidence", type: "vocab", meaning: "Bằng chứng", phrase: "The police found no evidence at the crime scene.", category: "general" },
            { word: "Manufacturing", type: "vocab", meaning: "Chế tạo", phrase: "This country's economy relies heavily on manufacturing.", category: "general" },
            { word: "Flourished", type: "vocab", meaning: "Hưng thịnh, phát triển mạnh mẽ", phrase: "The business flourished after moving to the city center.", category: "general" },
            { word: "Homogenization", type: "vocab", meaning: "Đồng nhất hóa", phrase: "The homogenization of culture means many cities look the same now.", category: "general" },
            { word: "Investment", type: "vocab", meaning: "Sự đầu tư", phrase: "Buying a house is a solid long-term investment.", category: "general" },
            { word: "Cartel", type: "vocab", meaning: "Thỏa thuận cạnh tranh", phrase: "An illegal cartel controls the prices of that product.", category: "general" },
            { word: "Disorienting", type: "vocab", meaning: "Mất phương hướng", phrase: "Being in a foreign country without knowing the language can be disorienting.", category: "general" },
            { word: "A light at the end of the tunnel", type: "phrase/idiom", meaning: "Ánh sáng cuối đường hầm", phrase: "After months of hard study, exam day is finally the light at the end of the tunnel.", category: "general" }
        ];
const categoryLabels = { general: { label: "Từ vựng chung", class: "cat-goals" } };
let learnedWords=JSON.parse(localStorage.getItem('lv6unit10Learned')||'[]');let currentFilter='all';
function speakWord(w,b){window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(w);u.lang='en-US';u.rate=0.85;const v=window.speechSynthesis.getVoices();const e=v.find(x=>x.lang.startsWith('en'));if(e)u.voice=e;b.classList.add('speaking');u.onend=()=>b.classList.remove('speaking');u.onerror=()=>b.classList.remove('speaking');window.speechSynthesis.speak(u);}
function speakPhrase(h,b){const d=document.createElement('div');d.innerHTML=h;speakWord(d.textContent||d.innerText,b);}
if(window.speechSynthesis.onvoiceschanged!==undefined)window.speechSynthesis.onvoiceschanged=()=>{};
function renderCards(f='all',s=''){const g=document.getElementById('vocabGrid');g.innerHTML='';let d=vocabularyData;if(f!=='all')d=d.filter(v=>v.category===f);if(s){const q=s.toLowerCase();d=d.filter(v=>v.word.toLowerCase().includes(q)||v.meaning.toLowerCase().includes(q));}d.forEach(v=>{const c=categoryLabels[v.category];const il=learnedWords.includes(v.word);const card=document.createElement('div');card.className=`vocab-card ${il?'learned':''}`;card.style.opacity=il?'0.7':'1';const pe=v.phrase.replace(/'/g,"\\'");card.innerHTML=`<span class="category-tag ${c.class}">${c.label}</span><div class="word"><button class="speak-btn" onclick="event.stopPropagation();speakWord('${v.word.replace(/'/g,"\\'")}',this)">🔊</button><span>${il?'✅ ':''}${v.word}</span></div><span class="type">${v.type}</span><div class="meaning">${v.meaning}</div><div class="phrase"><div class="phrase-header"><button class="speak-btn" onclick="event.stopPropagation();speakPhrase('${pe}',this)">🔊</button><span class="phrase-label">Example:</span></div><p class="phrase-text">${v.phrase}</p></div>`;card.addEventListener('click',()=>card.classList.toggle('expanded'));card.addEventListener('dblclick',()=>toggleLearned(v.word));g.appendChild(card);});updateProgress();}
function toggleLearned(w){if(learnedWords.includes(w))learnedWords=learnedWords.filter(x=>x!==w);else learnedWords.push(w);localStorage.setItem('lv6unit10Learned',JSON.stringify(learnedWords));renderCards(currentFilter,document.getElementById('searchInput').value);}
function updateProgress(){const t=vocabularyData.length,l=learnedWords.length,p=Math.round((l/t)*100);document.getElementById('learnedWords').textContent=l;document.getElementById('totalWords').textContent=t;document.getElementById('progressFill').style.width=p+'%';document.getElementById('progressText').textContent=p+'%';}
document.querySelectorAll('.filter-btn').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');currentFilter=b.dataset.filter;renderCards(currentFilter,document.getElementById('searchInput').value);});});
document.getElementById('searchInput').addEventListener('input',e=>renderCards(currentFilter,e.target.value));
renderCards();
</script>
</body>
</html>
