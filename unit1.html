<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit 1 - Dreams & Goals</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --secondary: #6366f1; --dark: #1e1b4b; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .back-btn { display: inline-flex; align-items: center; gap: 8px; color: rgba(255,255,255,0.8); text-decoration: none; font-size: 0.9rem; padding: 8px 16px; border-radius: 20px; background: rgba(255,255,255,0.15); transition: all 0.3s; margin-bottom: 15px; }
        .back-btn:hover { background: rgba(255,255,255,0.3); transform: translateX(-3px); }
        header { text-align: center; padding: 30px 20px; color: white; }
        header h1 { font-size: 2.5rem; text-shadow: 2px 2px 10px rgba(0,0,0,0.3); margin-bottom: 8px; }
        header p { font-size: 1.1rem; opacity: 0.9; }
        .stats { display: flex; justify-content: center; gap: 20px; margin: 20px 0; flex-wrap: wrap; }
        .stat-card { background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); padding: 15px 30px; border-radius: 16px; text-align: center; color: white; }
        .stat-card h3 { font-size: 2rem; }
        .stat-card p { opacity: 0.8; font-size: 0.85rem; }
        .progress-bar { width: 100%; max-width: 500px; height: 8px; background: rgba(255,255,255,0.3); border-radius: 10px; margin: 15px auto; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #10b981, #34d399); border-radius: 10px; width: 0%; transition: width 0.5s ease; }
        .learned-count { text-align: center; color: white; margin-bottom: 15px; font-size: 0.9rem; }
        .search-box { display: flex; justify-content: center; margin-bottom: 15px; }
        .search-box input { width: 100%; max-width: 500px; padding: 12px 22px; border: none; border-radius: 50px; font-size: 1rem; box-shadow: 0 5px 20px rgba(0,0,0,0.1); font-family: inherit; }
        .search-box input:focus { outline: 3px solid var(--primary); }
        .filter-tabs { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin: 20px 0; }
        .filter-btn { padding: 10px 20px; border: none; border-radius: 25px; background: rgba(255,255,255,0.2); color: white; cursor: pointer; transition: all 0.3s; font-family: inherit; font-size: 0.9rem; }
        .filter-btn:hover, .filter-btn.active { background: white; color: var(--primary); transform: translateY(-2px); }
        .vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 18px; margin-top: 20px; }
        .vocab-card { background: white; border-radius: 18px; padding: 22px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); transition: all 0.3s ease; cursor: pointer; position: relative; overflow: hidden; }
        .vocab-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: linear-gradient(180deg, var(--primary), var(--secondary)); }
        .vocab-card:hover { transform: translateY(-4px); box-shadow: 0 15px 40px rgba(0,0,0,0.15); }
        .vocab-card .word { font-size: 1.3rem; font-weight: 700; color: var(--dark); margin-bottom: 4px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .speak-btn { background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; color: white; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; flex-shrink: 0; }
        .speak-btn:hover { transform: scale(1.15); box-shadow: 0 4px 15px rgba(59,130,246,0.4); }
        .speak-btn.speaking { animation: pulse 0.8s infinite; background: linear-gradient(135deg, #10b981, #34d399); }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        .vocab-card .type { display: inline-block; font-size: 0.7rem; color: #94a3b8; font-style: italic; margin-bottom: 4px; }
        .vocab-card .meaning { color: var(--primary); font-weight: 500; margin-bottom: 4px; }
        .vocab-card .phrase { background: linear-gradient(135deg, #eff6ff, #dbeafe); padding: 12px; border-radius: 10px; font-size: 0.9rem; line-height: 1.6; color: #334155; display: none; }
        .vocab-card.expanded .phrase { display: block; animation: fadeIn 0.3s ease; }
        .phrase-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .phrase-header .speak-btn { width: 26px; height: 26px; font-size: 11px; }
        .phrase-label { font-weight: 600; color: var(--primary); font-size: 0.8rem; }
        .phrase-text { margin: 0; }
        .category-tag { display: inline-block; padding: 3px 10px; border-radius: 15px; font-size: 0.7rem; margin-bottom: 8px; font-weight: 500; }
        .cat-goals { background: #dbeafe; color: #2563eb; }
        .cat-education { background: #f3e8ff; color: #9333ea; }
        .cat-employment { background: #d1fae5; color: #059669; }
        .cat-qualities { background: #fef3c7; color: #d97706; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
        footer { text-align: center; padding: 30px; color: white; opacity: 0.8; font-size: 0.9rem; }
        @media (max-width: 768px) { header h1 { font-size: 1.8rem; } .vocab-grid { grid-template-columns: 1fr; } .stats { flex-direction: column; align-items: center; } }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← Quay lại</a>
        <header>
            <h1>🎯 Unit 1: Dreams & Goals</h1>
            <p>Click vào thẻ để xem giải thích, double-click để đánh dấu đã học</p>
        </header>
        <div class="stats">
            <div class="stat-card"><h3 id="totalWords">0</h3><p>Tổng từ</p></div>
            <div class="stat-card"><h3 id="learnedWords">0</h3><p>Đã học</p></div>
            <div class="stat-card"><h3>1</h3><p>Nhóm</p></div>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <p class="learned-count">Tiến độ: <span id="progressText">0%</span></p>
        <div class="search-box"><input type="text" id="searchInput" placeholder="🔍 Tìm kiếm từ vựng..."></div>
        
        <div class="vocab-grid" id="vocabGrid"></div>
        <footer><p>💡 Double-click để đánh dấu đã học</p></footer>
    </div>
    <script>
        const vocabularyData = [
            { word: "Achievable", type: "adj", meaning: "Có thể đạt được.", phrase: "You should set an achievable goal for your English class.", category: "general" },
            { word: "Ambitious", type: "adj", meaning: "Đầy tham vọng.", phrase: "He is an ambitious student who wants to study in the US.", category: "general" },
            { word: "Apply for", type: "v", meaning: "Nộp đơn xin việc/ứng tuyển.", phrase: "I want to apply for the sales position.", category: "general" },
            { word: "Apply to", type: "v", meaning: "Nộp đơn vào trường/chương trình.", phrase: "She decided to apply to the university.", category: "general" },
            { word: "Apparently / Obvious", type: "phrase/idiom", meaning: "Rõ ràng.", phrase: "Apparently, he didn\'t study for the test.", category: "general" },
            { word: "Attach", type: "v", meaning: "Đính kèm.", phrase: "Please attach your resume to the email.", category: "general" },
            { word: "Be accepted to/into/by", type: "v", meaning: "Được chấp nhận.", phrase: "I was accepted into the IT program.", category: "general" },
            { word: "Be rejected by", type: "v", meaning: "Bị từ chối.", phrase: "He was rejected by the company because he lacked experience.", category: "general" },
            { word: "Brag", type: "v", meaning: "Khoe khoang.", phrase: "He always brags about his new car.", category: "general" },
            { word: "Breadwinner", type: "n", meaning: "Trụ cột gia đình.", phrase: "My father is the main breadwinner in my family.", category: "general" },
            { word: "Candidate", type: "n", meaning: "Ứng viên.", phrase: "She is the best candidate for this job.", category: "general" },
            { word: "Career", type: "n", meaning: "Sự nghiệp.", phrase: "I want to build a career in artificial intelligence.", category: "general" },
            { word: "Colleague", type: "n", meaning: "Đồng nghiệp.", phrase: "My colleagues are very friendly and helpful.", category: "general" },
            { word: "Competitive", type: "adj", meaning: "Cạnh tranh.", phrase: "The smartphone market is very competitive.", category: "general" },
            { word: "Criticize", type: "v", meaning: "Chỉ trích.", phrase: "The manager criticized him for being late.", category: "general" },
            { word: "Demonstrate", type: "v", meaning: "Chứng minh/Thể hiện.", phrase: "You need to demonstrate your skills in the interview.", category: "general" },
            { word: "End up + V-ing", type: "phrase/idiom", meaning: "Cuối cùng lại làm gì (không dự định trước).", phrase: "We got lost and ended up walking for miles.", category: "general" },
            { word: "Enroll in", type: "v", meaning: "Đăng ký (khóa học/trường).", phrase: "I will enroll in a yoga class next month.", category: "general" },
            { word: "Expect", type: "v", meaning: "Mong đợi.", phrase: "I expect to pass the exam with high marks.", category: "general" },
            { word: "Fulfill", type: "v", meaning: "Hoàn thành/Thực hiện (ước mơ).", phrase: "She finally fulfilled her dream of becoming a doctor.", category: "general" },
            { word: "Heritage", type: "n", meaning: "Di sản.", phrase: "We must protect our cultural heritage.", category: "general" },
            { word: "I'll keep my fingers crossed for you", type: "phrase/idiom", meaning: "Chúc may mắn.", phrase: "You have a test tomorrow? I\'ll keep my fingers crossed for you!", category: "general" },
            { word: "I've got my heart set on", type: "phrase/idiom", meaning: "Thực sự rất muốn.", phrase: "I\'ve got my heart set on buying a new laptop.", category: "general" },
            { word: "It’s just waiting and seeing", type: "phrase/idiom", meaning: "Cứ chờ xem sao.", phrase: "We did our best. Now it\'s just waiting and seeing.", category: "general" },
            { word: "Major red flag", type: "phrase/idiom", meaning: "Dấu hiệu cảnh báo nghiêm trọng.", phrase: "Arriving late for an interview is a major red flag.", category: "general" },
            { word: "Modest", type: "adj", meaning: "Khiêm tốn.", phrase: "Even though he is rich, he is very modest.", category: "general" },
            { word: "Observe", type: "v", meaning: "Quan sát.", phrase: "The teacher asked us to observe the birds in the park.", category: "general" },
            { word: "Outstanding", type: "adj", meaning: "Vượt trội/Xuất sắc.", phrase: "He is an outstanding player in our team.", category: "general" },
            { word: "Possess", type: "v", meaning: "Sở hữu.", phrase: "You need to possess good communication skills.", category: "general" },
            { word: "Pursue", type: "v", meaning: "Theo đuổi.", phrase: "I want to pursue a career in technology.", category: "general" },
            { word: "Put off", type: "v", meaning: "Trì hoãn.", phrase: "Don\'t put off your homework until tomorrow.", category: "general" },
            { word: "Realistic", type: "adj", meaning: "Thực tế.", phrase: "We need a realistic plan to finish this project.", category: "general" },
            { word: "Reassure", type: "v", meaning: "Trấn an.", phrase: "The doctor reassured the patient that the surgery was safe.", category: "general" },
            { word: "Resume", type: "n", meaning: "Sơ yếu lý lịch.", phrase: "I sent my resume to the HR department.", category: "general" },
            { word: "Run of the mill / Ordinary", type: "phrase/idiom", meaning: "Bình thường/Không đặc biệt.", phrase: "It was just a run-of-the-mill action movie.", category: "general" },
            { word: "Set a goal", type: "phrase/idiom", meaning: "Đặt mục tiêu.", phrase: "You should set a goal to read one book a month.", category: "general" },
            { word: "Sign up for", type: "v", meaning: "Đăng ký (hoạt động).", phrase: "I want to sign up for the English club.", category: "general" },
            { word: "Six of one, half a dozen of the other", type: "phrase/idiom", meaning: "Như nhau cả thôi.", phrase: "We can take the bus or the train; it\'s six of one, half a dozen of the other.", category: "general" },
            { word: "Spouse", type: "n", meaning: "Vợ/Chồng.", phrase: "Employees can bring their spouse to the company party.", category: "general" },
            { word: "Switch to", type: "v", meaning: "Chuyển sang.", phrase: "I decided to switch to a healthier diet.", category: "general" },
            { word: "Take up", type: "v", meaning: "Bắt đầu một thói quen/sở thích mới.", phrase: "I plan to take up playing the guitar.", category: "general" },
            { word: "The sky’s the limit", type: "phrase/idiom", meaning: "Không có giới hạn.", phrase: "With your talent, the sky\'s the limit!", category: "general" },
            { word: "Work towards", type: "phrase/idiom", meaning: "Hướng tới/Làm việc vì mục tiêu.", phrase: "We are working towards a better future.", category: "general" }
        ];
        const categoryLabels = {
            general: { label: "Từ vựng chung", class: "cat-goals" }
        };
        let learnedWords = JSON.parse(localStorage.getItem('lv6unit1Learned') || '[]');
        let currentFilter = 'all';
        function speakWord(word, button) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(word); u.lang='en-US'; u.rate=0.85; u.pitch=1;
            const v = window.speechSynthesis.getVoices(); const e = v.find(x=>x.lang.startsWith('en'));
            if(e) u.voice=e; button.classList.add('speaking');
            u.onend=()=>button.classList.remove('speaking'); u.onerror=()=>button.classList.remove('speaking');
            window.speechSynthesis.speak(u);
        }
        function speakPhrase(h, btn) { const d=document.createElement('div'); d.innerHTML=h; speakWord(d.textContent||d.innerText, btn); }
        if(window.speechSynthesis.onvoiceschanged!==undefined) window.speechSynthesis.onvoiceschanged=()=>{};
        function renderCards(filter='all', search='') {
            const grid=document.getElementById('vocabGrid'); grid.innerHTML='';
            let data=vocabularyData;
            if(filter!=='all') data=data.filter(v=>v.category===filter);
            if(search){const s=search.toLowerCase(); data=data.filter(v=>v.word.toLowerCase().includes(s)||v.meaning.toLowerCase().includes(s));}
            data.forEach(vocab=>{
                const cat=categoryLabels[vocab.category]; const isLearned=learnedWords.includes(vocab.word);
                const card=document.createElement('div'); card.className=`vocab-card ${isLearned?'learned':''}`;
                card.style.opacity=isLearned?'0.7':'1';
                const pe=vocab.phrase.replace(/'/g,"\\'");
                card.innerHTML=`
                    <span class="category-tag ${cat.class}">${cat.label}</span>
                    <div class="word"><button class="speak-btn" onclick="event.stopPropagation();speakWord('${vocab.word.replace(/'/g,"\\'")}',this)" title="Nghe">🔊</button><span>${isLearned?'✅ ':''}${vocab.word}</span></div>
                    <span class="type">${vocab.type}</span>
                    <div class="meaning">${vocab.meaning}</div>
                    <div class="phrase"><div class="phrase-header"><button class="speak-btn" onclick="event.stopPropagation();speakPhrase('${pe}',this)" title="Nghe">🔊</button><span class="phrase-label">Example:</span></div><p class="phrase-text">${vocab.phrase}</p></div>`;
                card.addEventListener('click',()=>card.classList.toggle('expanded'));
                card.addEventListener('dblclick',()=>toggleLearned(vocab.word));
                grid.appendChild(card);
            });
            updateProgress();
        }
        function toggleLearned(word) {
            if(learnedWords.includes(word)) learnedWords=learnedWords.filter(w=>w!==word);
            else learnedWords.push(word);
            localStorage.setItem('lv6unit1Learned',JSON.stringify(learnedWords));
            renderCards(currentFilter,document.getElementById('searchInput').value);
        }
        function updateProgress() {
            const t=vocabularyData.length,l=learnedWords.length,p=Math.round((l/t)*100);
            document.getElementById('learnedWords').textContent=l;
            document.getElementById('totalWords').textContent=t;
            document.getElementById('progressFill').style.width=p+'%';
            document.getElementById('progressText').textContent=p+'%';
        }
        document.querySelectorAll('.filter-btn').forEach(btn=>{
            btn.addEventListener('click',()=>{
                document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active'); currentFilter=btn.dataset.filter;
                renderCards(currentFilter,document.getElementById('searchInput').value);
            });
        });
        document.getElementById('searchInput').addEventListener('input',e=>renderCards(currentFilter,e.target.value));
        renderCards();
    </script>
</body>
</html>
