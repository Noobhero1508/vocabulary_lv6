<!DOCTYPE html>
<html lang="vi">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --secondary: #6366f1; --dark: #1e1b4b; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .back-btn { display: inline-flex; align-items: center; gap: 8px; color: rgba(255,255,255,0.8); text-decoration: none; font-size: 0.9rem; padding: 8px 16px; border-radius: 20px; background: rgba(255,255,255,0.15); transition: all 0.3s; margin-bottom: 15px; }
        .back-btn:hover { background: rgba(255,255,255,0.3); transform: translateX(-3px); }
        header { text-align: center; padding: 30px 20px; color: white; }
        header h1 { font-size: 2.5rem; text-shadow: 2px 2px 10px rgba(0,0,0,0.3); margin-bottom: 8px; }
        header p { font-size: 1.1rem; opacity: 0.9; }
        .stats { display: flex; justify-content: center; gap: 20px; margin: 20px 0; flex-wrap: wrap; }
        .stat-card { background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); padding: 15px 30px; border-radius: 16px; text-align: center; color: white; }
        .stat-card h3 { font-size: 2rem; }
        .stat-card p { opacity: 0.8; font-size: 0.85rem; }
        .progress-bar { width: 100%; max-width: 500px; height: 8px; background: rgba(255,255,255,0.3); border-radius: 10px; margin: 15px auto; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #10b981, #34d399); border-radius: 10px; width: 0%; transition: width 0.5s ease; }
        .learned-count { text-align: center; color: white; margin-bottom: 15px; font-size: 0.9rem; }
        .search-box { display: flex; justify-content: center; margin-bottom: 15px; }
        .search-box input { width: 100%; max-width: 500px; padding: 12px 22px; border: none; border-radius: 50px; font-size: 1rem; box-shadow: 0 5px 20px rgba(0,0,0,0.1); font-family: inherit; }
        .search-box input:focus { outline: 3px solid var(--primary); }
        .filter-tabs { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin: 20px 0; }
        .filter-btn { padding: 10px 20px; border: none; border-radius: 25px; background: rgba(255,255,255,0.2); color: white; cursor: pointer; transition: all 0.3s; font-family: inherit; font-size: 0.9rem; }
        .filter-btn:hover, .filter-btn.active { background: white; color: var(--primary); transform: translateY(-2px); }
        .vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 18px; margin-top: 20px; }
        .vocab-card { background: white; border-radius: 18px; padding: 22px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); transition: all 0.3s ease; cursor: pointer; position: relative; overflow: hidden; }
        .vocab-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: linear-gradient(180deg, var(--primary), var(--secondary)); }
        .vocab-card:hover { transform: translateY(-4px); box-shadow: 0 15px 40px rgba(0,0,0,0.15); }
        .vocab-card .word { font-size: 1.3rem; font-weight: 700; color: var(--dark); margin-bottom: 4px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .speak-btn { background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; color: white; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; flex-shrink: 0; }
        .speak-btn:hover { transform: scale(1.15); box-shadow: 0 4px 15px rgba(59,130,246,0.4); }
        .speak-btn.speaking { animation: pulse 0.8s infinite; background: linear-gradient(135deg, #10b981, #34d399); }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        .vocab-card .type { display: inline-block; font-size: 0.7rem; color: #94a3b8; font-style: italic; margin-bottom: 4px; }
        .vocab-card .meaning { color: var(--primary); font-weight: 500; margin-bottom: 4px; }
        .vocab-card .phrase { background: linear-gradient(135deg, #eff6ff, #dbeafe); padding: 12px; border-radius: 10px; font-size: 0.9rem; line-height: 1.6; color: #334155; display: none; }
        .vocab-card.expanded .phrase { display: block; animation: fadeIn 0.3s ease; }
        .phrase-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .phrase-header .speak-btn { width: 26px; height: 26px; font-size: 11px; }
        .phrase-label { font-weight: 600; color: var(--primary); font-size: 0.8rem; }
        .phrase-text { margin: 0; }
        .category-tag { display: inline-block; padding: 3px 10px; border-radius: 15px; font-size: 0.7rem; margin-bottom: 8px; font-weight: 500; }
        .cat-goals { background: #dbeafe; color: #2563eb; }
        .cat-education { background: #f3e8ff; color: #9333ea; }
        .cat-employment { background: #d1fae5; color: #059669; }
        .cat-qualities { background: #fef3c7; color: #d97706; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
        footer { text-align: center; padding: 30px; color: white; opacity: 0.8; font-size: 0.9rem; }
        @media (max-width: 768px) { header h1 { font-size: 1.8rem; } .vocab-grid { grid-template-columns: 1fr; } .stats { flex-direction: column; align-items: center; } }
    </style>
</head>

        const categoryLabels = { general: { label: "Từ vựng chung", class: "cat-goals" } };
        let learnedWords = JSON.parse(localStorage.getItem('lv6unit1Learned') || '[]');
        let currentFilter = 'all';
        function speakWord(word, button) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(word); u.lang='en-US'; u.rate=0.85; u.pitch=1;
            const v = window.speechSynthesis.getVoices(); const e = v.find(x=>x.lang.startsWith('en'));
            if(e) u.voice=e; button.classList.add('speaking');
            u.onend=()=>button.classList.remove('speaking'); u.onerror=()=>button.classList.remove('speaking');
            window.speechSynthesis.speak(u);
        }
        function speakPhrase(h, btn) { const d=document.createElement('div'); d.innerHTML=h; speakWord(d.textContent||d.innerText, btn); }
        if(window.speechSynthesis.onvoiceschanged!==undefined) window.speechSynthesis.onvoiceschanged=()=>{};
        function renderCards(filter='all', search='') {
            const grid=document.getElementById('vocabGrid'); grid.innerHTML='';
            let data=vocabularyData;
            if(filter!=='all') data=data.filter(v=>v.category===filter);
            if(search){const s=search.toLowerCase(); data=data.filter(v=>v.word.toLowerCase().includes(s)||v.meaning.toLowerCase().includes(s));}
            data.forEach(vocab=>{
                const cat=categoryLabels[vocab.category]; const isLearned=learnedWords.includes(vocab.word);
                const card=document.createElement('div'); card.className=`vocab-card ${isLearned?'learned':''}`;
                card.style.opacity=isLearned?'0.7':'1';
                const pe=vocab.phrase.replace(/'/g,"\\'");
                card.innerHTML=`
                    <span class="category-tag ${cat.class}">${cat.label}</span>
                    <div class="word"><button class="speak-btn" onclick="event.stopPropagation();speakWord('${vocab.word.replace(/'/g,"\\'")}',this)" title="Nghe">🔊</button><span>${isLearned?'✅ ':''}${vocab.word}</span></div>
                    <span class="type">${vocab.type}</span>
                    <div class="meaning">${vocab.meaning}</div>
                    <div class="phrase"><div class="phrase-header"><button class="speak-btn" onclick="event.stopPropagation();speakPhrase('${pe}',this)" title="Nghe">🔊</button><span class="phrase-label">Example:</span></div><p class="phrase-text">${vocab.phrase}</p></div>`;
                card.addEventListener('click',()=>card.classList.toggle('expanded'));
                card.addEventListener('dblclick',()=>toggleLearned(vocab.word));
                grid.appendChild(card);
            });
            updateProgress();
        }
        function toggleLearned(word) {
            if(learnedWords.includes(word)) learnedWords=learnedWords.filter(w=>w!==word);
            else learnedWords.push(word);
            localStorage.setItem('lv6unit1Learned',JSON.stringify(learnedWords));
            renderCards(currentFilter,document.getElementById('searchInput').value);
        }
        function updateProgress() {
            const t=vocabularyData.length,l=learnedWords.length,p=Math.round((l/t)*100);
            document.getElementById('learnedWords').textContent=l;
            document.getElementById('totalWords').textContent=t;
            document.getElementById('progressFill').style.width=p+'%';
            document.getElementById('progressText').textContent=p+'%';
        }
        document.querySelectorAll('.filter-btn').forEach(btn=>{
            btn.addEventListener('click',()=>{
                document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active'); currentFilter=btn.dataset.filter;
                renderCards(currentFilter,document.getElementById('searchInput').value);
            });
        });
        document.getElementById('searchInput').addEventListener('input',e=>renderCards(currentFilter,e.target.value));
        renderCards();
