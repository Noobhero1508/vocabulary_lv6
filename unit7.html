<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit 7 - Mind Over Matter</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--primary:#7c3aed;--secondary:#a855f7;--dark:#1e1b4b}*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Outfit',sans-serif;background:linear-gradient(135deg,#7c3aed 0%,#a855f7 100%);min-height:100vh;padding:20px}.container{max-width:1400px;margin:0 auto}.back-btn{display:inline-flex;align-items:center;gap:8px;color:rgba(255,255,255,0.8);text-decoration:none;font-size:0.9rem;padding:8px 16px;border-radius:20px;background:rgba(255,255,255,0.15);transition:all 0.3s;margin-bottom:15px}.back-btn:hover{background:rgba(255,255,255,0.3);transform:translateX(-3px)}header{text-align:center;padding:30px 20px;color:white}header h1{font-size:2.5rem;text-shadow:2px 2px 10px rgba(0,0,0,0.3);margin-bottom:8px}header p{font-size:1.1rem;opacity:0.9}.stats{display:flex;justify-content:center;gap:20px;margin:20px 0;flex-wrap:wrap}.stat-card{background:rgba(255,255,255,0.2);backdrop-filter:blur(10px);padding:15px 30px;border-radius:16px;text-align:center;color:white}.stat-card h3{font-size:2rem}.stat-card p{opacity:0.8;font-size:0.85rem}.progress-bar{width:100%;max-width:500px;height:8px;background:rgba(255,255,255,0.3);border-radius:10px;margin:15px auto;overflow:hidden}.progress-fill{height:100%;background:linear-gradient(90deg,#10b981,#34d399);border-radius:10px;width:0%;transition:width 0.5s ease}.learned-count{text-align:center;color:white;margin-bottom:15px;font-size:0.9rem}.search-box{display:flex;justify-content:center;margin-bottom:15px}.search-box input{width:100%;max-width:500px;padding:12px 22px;border:none;border-radius:50px;font-size:1rem;box-shadow:0 5px 20px rgba(0,0,0,0.1);font-family:inherit}.search-box input:focus{outline:3px solid var(--primary)}.filter-tabs{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin:20px 0}.filter-btn{padding:10px 20px;border:none;border-radius:25px;background:rgba(255,255,255,0.2);color:white;cursor:pointer;transition:all 0.3s;font-family:inherit;font-size:0.9rem}.filter-btn:hover,.filter-btn.active{background:white;color:var(--primary);transform:translateY(-2px)}.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px;margin-top:20px}.vocab-card{background:white;border-radius:18px;padding:22px;box-shadow:0 8px 30px rgba(0,0,0,0.1);transition:all 0.3s ease;cursor:pointer;position:relative;overflow:hidden}.vocab-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:linear-gradient(180deg,var(--primary),var(--secondary))}.vocab-card:hover{transform:translateY(-4px);box-shadow:0 15px 40px rgba(0,0,0,0.15)}.vocab-card .word{font-size:1.3rem;font-weight:700;color:var(--dark);margin-bottom:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}.speak-btn{background:linear-gradient(135deg,var(--primary),var(--secondary));border:none;color:white;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all 0.3s ease;flex-shrink:0}.speak-btn:hover{transform:scale(1.15)}.speak-btn.speaking{animation:pulse 0.8s infinite;background:linear-gradient(135deg,#10b981,#34d399)}@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}.vocab-card .type{display:inline-block;font-size:0.7rem;color:#94a3b8;font-style:italic;margin-bottom:4px}.vocab-card .meaning{color:var(--primary);font-weight:500;margin-bottom:4px}.vocab-card .phrase{background:linear-gradient(135deg,#faf5ff,#f3e8ff);padding:12px;border-radius:10px;font-size:0.9rem;line-height:1.6;color:#334155;display:none}.vocab-card.expanded .phrase{display:block;animation:fadeIn 0.3s ease}.phrase-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}.phrase-header .speak-btn{width:26px;height:26px;font-size:11px}.phrase-label{font-weight:600;color:var(--primary);font-size:0.8rem}.phrase-text{margin:0}.category-tag{display:inline-block;padding:3px 10px;border-radius:15px;font-size:0.7rem;margin-bottom:8px;font-weight:500}.cat-phobias{background:#fee2e2;color:#dc2626}.cat-mind{background:#dbeafe;color:#2563eb}.cat-medical{background:#d1fae5;color:#059669}.cat-other{background:#fef3c7;color:#d97706}@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}footer{text-align:center;padding:30px;color:white;opacity:0.8;font-size:0.9rem}@media(max-width:768px){header h1{font-size:1.8rem}.vocab-grid{grid-template-columns:1fr}.stats{flex-direction:column;align-items:center}}
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-btn">← Quay lại</a>
    <header><h1>🧠 Unit 7: Mind Over Matter</h1><p>Click thẻ để xem giải thích, double-click để đánh dấu đã học</p></header>
    <div class="stats"><div class="stat-card"><h3 id="totalWords">0</h3><p>Tổng từ</p></div><div class="stat-card"><h3 id="learnedWords">0</h3><p>Đã học</p></div><div class="stat-card"><h3>4</h3><p>Nhóm</p></div></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <p class="learned-count">Tiến độ: <span id="progressText">0%</span></p>
    <div class="search-box"><input type="text" id="searchInput" placeholder="🔍 Tìm kiếm..."></div>
    <div class="filter-tabs">
        <button class="filter-btn active" data-filter="all">Tất cả</button>
        <button class="filter-btn" data-filter="phobias">Hội chứng sợ</button>
        <button class="filter-btn" data-filter="mind">Tâm trí</button>
        <button class="filter-btn" data-filter="medical">Y khoa</button>
        <button class="filter-btn" data-filter="other">Khác</button>
    </div>
    <div class="vocab-grid" id="vocabGrid"></div>
    <footer><p>💡 Double-click để đánh dấu đã học</p></footer>
</div>
<script>
const vocabularyData=[
{word:"acrophobia",type:"noun",meaning:"chứng sợ độ cao",phrase:"An extreme fear of high places.",category:"phobias"},
{word:"adverse",type:"adjective",meaning:"bất lợi, ngược lại",phrase:"Having a negative or harmful effect.",category:"medical"},
{word:"aerophobia",type:"noun",meaning:"chứng sợ bay",phrase:"A strong fear of flying in an airplane.",category:"phobias"},
{word:"agoraphobia",type:"noun",meaning:"chứng sợ không gian rộng",phrase:"A fear of being in public places or open spaces.",category:"phobias"},
{word:"arachnophobia",type:"noun",meaning:"chứng sợ nhện",phrase:"A strong fear of spiders.",category:"phobias"},
{word:"assert",type:"verb",meaning:"khẳng định",phrase:"To state firmly that something is true.",category:"other"},
{word:"be all in one's mind",type:"phrase",meaning:"chỉ là tưởng tượng",phrase:"To be imagined and not real.",category:"mind"},
{word:"be out of one's mind",type:"phrase",meaning:"mất trí, điên rồ",phrase:"To be crazy or very foolish.",category:"mind"},
{word:"change one's mind",type:"phrase",meaning:"thay đổi suy nghĩ",phrase:"To make a different decision or change your opinion.",category:"mind"},
{word:"charm",type:"noun",meaning:"bùa may mắn",phrase:"An object believed to have magic powers to bring good luck.",category:"other"},
{word:"cite",type:"verb",meaning:"trích dẫn",phrase:"To mention something as proof or as a reason.",category:"other"},
{word:"claustrophobia",type:"noun",meaning:"chứng sợ không gian hẹp",phrase:"A fear of being in closed or narrow spaces.",category:"phobias"},
{word:"deprive",type:"verb",meaning:"tước đoạt, lấy đi",phrase:"To take something necessary or pleasant away from someone.",category:"other"},
{word:"don't get me wrong",type:"idiom",meaning:"đừng hiểu nhầm ý tôi",phrase:"Do not misunderstand what I am saying.",category:"mind"},
{word:"doom",type:"noun/verb",meaning:"sự sụp đổ, bi đát",phrase:"A terrible event that you cannot avoid.",category:"other"},
{word:"dose",type:"noun",meaning:"liều lượng thuốc",phrase:"A measured amount of medicine to take at one time.",category:"medical"},
{word:"horizontal",type:"adjective",meaning:"chiều ngang",phrase:"Flat and level; going from left to right.",category:"other"},
{word:"I may be imagining things",type:"idiom",meaning:"có lẽ tôi đang tưởng tượng",phrase:"I might be seeing or hearing things that are not really there.",category:"mind"},
{word:"if I were in your shoes",type:"idiom",meaning:"nếu tôi ở hoàn cảnh của bạn",phrase:"If I were in your situation.",category:"mind"},
{word:"illusion",type:"noun",meaning:"ảo giác",phrase:"Something that looks different from what it really is.",category:"mind"},
{word:"implication",type:"noun",meaning:"hàm ý",phrase:"A possible effect or result of an action or a decision.",category:"other"},
{word:"interior",type:"noun",meaning:"phần bên trong",phrase:"The inside part of something.",category:"other"},
{word:"interpret",type:"verb",meaning:"giải thích, làm sáng tỏ",phrase:"To explain the meaning of something.",category:"other"},
{word:"keep in mind",type:"phrase",meaning:"ghi nhớ",phrase:"To remember a piece of information when making a decision.",category:"mind"},
{word:"make up one's mind",type:"phrase",meaning:"quyết định",phrase:"To make a final decision.",category:"mind"},
{word:"one's mind",type:"phrase",meaning:"tâm trí",phrase:"Someone's thoughts and memory.",category:"mind"},
{word:"ophidiophobia",type:"noun",meaning:"chứng sợ rắn",phrase:"A fear of snakes.",category:"phobias"},
{word:"paranoid",type:"adj/noun",meaning:"hoang tưởng",phrase:"Believing that other people want to harm you.",category:"mind"},
{word:"phobia",type:"noun",meaning:"nỗi ám ảnh",phrase:"An extreme or unreasonable fear of a particular thing.",category:"phobias"},
{word:"prescribe",type:"verb",meaning:"kê đơn thuốc",phrase:"To say what medicine or treatment a sick person should have.",category:"medical"},
{word:"signify",type:"verb",meaning:"báo hiệu, có nghĩa là",phrase:"To mean something or be a sign of something.",category:"other"},
{word:"sink",type:"verb",meaning:"chìm lún",phrase:"To go down below the surface of water.",category:"other"},
{word:"slop",type:"verb",meaning:"làm tràn ra",phrase:"To spill liquid over the edge of a container.",category:"other"},
{word:"slur",type:"noun/verb",meaning:"nói líu nhíu, gièm pha",phrase:"To speak unclearly so that words join together.",category:"medical"},
{word:"spouse",type:"noun",meaning:"vợ hoặc chồng",phrase:"A husband or wife.",category:"other"},
{word:"suspend",type:"verb",meaning:"treo lên",phrase:"To hang something from above.",category:"other"},
{word:"the cat's out of the bag",type:"idiom",meaning:"lộ bí mật",phrase:"A secret has been revealed.",category:"mind"},
{word:"vertical",type:"adjective",meaning:"chiều dọc",phrase:"Pointing straight up and down.",category:"other"},
{word:"xenophobia",type:"noun",meaning:"hội chứng bài ngoại",phrase:"A strong dislike or fear of people from other countries.",category:"phobias"}
];
const categoryLabels={phobias:{label:"Hội chứng sợ",class:"cat-phobias"},mind:{label:"Tâm trí",class:"cat-mind"},medical:{label:"Y khoa",class:"cat-medical"},other:{label:"Khác",class:"cat-other"}};
let learnedWords=JSON.parse(localStorage.getItem('lv6unit7Learned')||'[]');let currentFilter='all';
function speakWord(w,b){window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(w);u.lang='en-US';u.rate=0.85;const v=window.speechSynthesis.getVoices();const e=v.find(x=>x.lang.startsWith('en'));if(e)u.voice=e;b.classList.add('speaking');u.onend=()=>b.classList.remove('speaking');u.onerror=()=>b.classList.remove('speaking');window.speechSynthesis.speak(u);}
function speakPhrase(h,b){const d=document.createElement('div');d.innerHTML=h;speakWord(d.textContent||d.innerText,b);}
if(window.speechSynthesis.onvoiceschanged!==undefined)window.speechSynthesis.onvoiceschanged=()=>{};
function renderCards(f='all',s=''){const g=document.getElementById('vocabGrid');g.innerHTML='';let d=vocabularyData;if(f!=='all')d=d.filter(v=>v.category===f);if(s){const q=s.toLowerCase();d=d.filter(v=>v.word.toLowerCase().includes(q)||v.meaning.toLowerCase().includes(q));}d.forEach(v=>{const c=categoryLabels[v.category];const il=learnedWords.includes(v.word);const card=document.createElement('div');card.className=`vocab-card ${il?'learned':''}`;card.style.opacity=il?'0.7':'1';const pe=v.phrase.replace(/'/g,"\\'");card.innerHTML=`<span class="category-tag ${c.class}">${c.label}</span><div class="word"><button class="speak-btn" onclick="event.stopPropagation();speakWord('${v.word.replace(/'/g,"\\'")}',this)">🔊</button><span>${il?'✅ ':''}${v.word}</span></div><span class="type">${v.type}</span><div class="meaning">${v.meaning}</div><div class="phrase"><div class="phrase-header"><button class="speak-btn" onclick="event.stopPropagation();speakPhrase('${pe}',this)">🔊</button><span class="phrase-label">English:</span></div><p class="phrase-text">${v.phrase}</p></div>`;card.addEventListener('click',()=>card.classList.toggle('expanded'));card.addEventListener('dblclick',()=>toggleLearned(v.word));g.appendChild(card);});updateProgress();}
function toggleLearned(w){if(learnedWords.includes(w))learnedWords=learnedWords.filter(x=>x!==w);else learnedWords.push(w);localStorage.setItem('lv6unit7Learned',JSON.stringify(learnedWords));renderCards(currentFilter,document.getElementById('searchInput').value);}
function updateProgress(){const t=vocabularyData.length,l=learnedWords.length,p=Math.round((l/t)*100);document.getElementById('learnedWords').textContent=l;document.getElementById('totalWords').textContent=t;document.getElementById('progressFill').style.width=p+'%';document.getElementById('progressText').textContent=p+'%';}
document.querySelectorAll('.filter-btn').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');currentFilter=b.dataset.filter;renderCards(currentFilter,document.getElementById('searchInput').value);});});
document.getElementById('searchInput').addEventListener('input',e=>renderCards(currentFilter,e.target.value));
renderCards();
</script>
</body>
</html>
