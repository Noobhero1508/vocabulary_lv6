<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit 2 - Character & Responsibility</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #8b5cf6; --secondary: #ec4899; --dark: #1e1b4b; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .back-btn { display: inline-flex; align-items: center; gap: 8px; color: rgba(255,255,255,0.8); text-decoration: none; font-size: 0.9rem; padding: 8px 16px; border-radius: 20px; background: rgba(255,255,255,0.15); transition: all 0.3s; margin-bottom: 15px; }
        .back-btn:hover { background: rgba(255,255,255,0.3); transform: translateX(-3px); }
        header { text-align: center; padding: 30px 20px; color: white; }
        header h1 { font-size: 2.5rem; text-shadow: 2px 2px 10px rgba(0,0,0,0.3); margin-bottom: 8px; }
        header p { font-size: 1.1rem; opacity: 0.9; }
        .stats { display: flex; justify-content: center; gap: 20px; margin: 20px 0; flex-wrap: wrap; }
        .stat-card { background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); padding: 15px 30px; border-radius: 16px; text-align: center; color: white; }
        .stat-card h3 { font-size: 2rem; } .stat-card p { opacity: 0.8; font-size: 0.85rem; }
        .progress-bar { width: 100%; max-width: 500px; height: 8px; background: rgba(255,255,255,0.3); border-radius: 10px; margin: 15px auto; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #10b981, #34d399); border-radius: 10px; width: 0%; transition: width 0.5s ease; }
        .learned-count { text-align: center; color: white; margin-bottom: 15px; font-size: 0.9rem; }
        .search-box { display: flex; justify-content: center; margin-bottom: 15px; }
        .search-box input { width: 100%; max-width: 500px; padding: 12px 22px; border: none; border-radius: 50px; font-size: 1rem; box-shadow: 0 5px 20px rgba(0,0,0,0.1); font-family: inherit; }
        .search-box input:focus { outline: 3px solid var(--primary); }
        .filter-tabs { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin: 20px 0; }
        .filter-btn { padding: 10px 20px; border: none; border-radius: 25px; background: rgba(255,255,255,0.2); color: white; cursor: pointer; transition: all 0.3s; font-family: inherit; font-size: 0.9rem; }
        .filter-btn:hover, .filter-btn.active { background: white; color: var(--primary); transform: translateY(-2px); }
        .vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 18px; margin-top: 20px; }
        .vocab-card { background: white; border-radius: 18px; padding: 22px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); transition: all 0.3s ease; cursor: pointer; position: relative; overflow: hidden; }
        .vocab-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: linear-gradient(180deg, var(--primary), var(--secondary)); }
        .vocab-card:hover { transform: translateY(-4px); box-shadow: 0 15px 40px rgba(0,0,0,0.15); }
        .vocab-card .word { font-size: 1.3rem; font-weight: 700; color: var(--dark); margin-bottom: 4px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .speak-btn { background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; color: white; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; flex-shrink: 0; }
        .speak-btn:hover { transform: scale(1.15); }
        .speak-btn.speaking { animation: pulse 0.8s infinite; background: linear-gradient(135deg, #10b981, #34d399); }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        .vocab-card .type { display: inline-block; font-size: 0.7rem; color: #94a3b8; font-style: italic; margin-bottom: 4px; }
        .vocab-card .meaning { color: var(--primary); font-weight: 500; margin-bottom: 4px; }
        .vocab-card .phrase { background: linear-gradient(135deg, #faf5ff, #f3e8ff); padding: 12px; border-radius: 10px; font-size: 0.9rem; line-height: 1.6; color: #334155; display: none; }
        .vocab-card.expanded .phrase { display: block; animation: fadeIn 0.3s ease; }
        .phrase-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .phrase-header .speak-btn { width: 26px; height: 26px; font-size: 11px; }
        .phrase-label { font-weight: 600; color: var(--primary); font-size: 0.8rem; }
        .phrase-text { margin: 0; }
        .category-tag { display: inline-block; padding: 3px 10px; border-radius: 15px; font-size: 0.7rem; margin-bottom: 8px; font-weight: 500; }
        .cat-people { background: #dbeafe; color: #2563eb; }
        .cat-character { background: #f3e8ff; color: #9333ea; }
        .cat-responsibility { background: #d1fae5; color: #059669; }
        .cat-giving { background: #fef3c7; color: #d97706; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)} }
        footer { text-align: center; padding: 30px; color: white; opacity: 0.8; font-size: 0.9rem; }
        @media(max-width:768px){header h1{font-size:1.8rem}.vocab-grid{grid-template-columns:1fr}.stats{flex-direction:column;align-items:center}}
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-btn">← Quay lại</a>
    <header><h1>🤝 Unit 2: Character & Responsibility</h1><p>Click thẻ để xem giải thích, double-click để đánh dấu đã học</p></header>
    <div class="stats"><div class="stat-card"><h3 id="totalWords">0</h3><p>Tổng từ</p></div><div class="stat-card"><h3 id="learnedWords">0</h3><p>Đã học</p></div><div class="stat-card"><h3>1</h3><p>Nhóm</p></div></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <p class="learned-count">Tiến độ: <span id="progressText">0%</span></p>
    <div class="search-box"><input type="text" id="searchInput" placeholder="🔍 Tìm kiếm..."></div>
    
    <div class="vocab-grid" id="vocabGrid"></div>
    <footer><p>💡 Double-click để đánh dấu đã học</p></footer>
</div>
<script>
const vocabularyData = [
            { word: "Preposition", type: "vocab", meaning: "Giới từ", phrase: "You use a preposition to show where something is.", category: "general" },
            { word: "Situation", type: "vocab", meaning: "Tình huống", phrase: "He remained calm in a stressful situation.", category: "general" },
            { word: "Suppose", type: "vocab", meaning: "Cho rằng", phrase: "I suppose we could go to the park instead.", category: "general" },
            { word: "Cracking up", type: "phrase/idiom", meaning: "Vỡ òa", phrase: "The movie was so funny, it had me cracking up.", category: "general" },
            { word: "Making fun of something", type: "phrase/idiom", meaning: "Chết diễu", phrase: "Stop making fun of my new haircut!", category: "general" },
            { word: "Couldn\'t help myself", type: "phrase/idiom", meaning: "Không thể ngăn bản thân", phrase: "I laughed because I couldn't help myself.", category: "general" },
            { word: "That’s not the worst of it", type: "phrase/idiom", meaning: "Đó không phải điều tệ duy nhất", phrase: "He lost his keys, but that’s not the worst of it.", category: "general" },
            { word: "Cut it out", type: "phrase/idiom", meaning: "Dừng lại đi! Stop it!", phrase: "You're being too noisy, cut it out!", category: "general" },
            { word: "Own up to something", type: "phrase/idiom", meaning: "Thừa nhận và chịu trách nhiệm về việc đó", phrase: "You need to own up to your mistakes.", category: "general" },
            { word: "Make it up to someone", type: "phrase/idiom", meaning: "Cố gắng đền bù/ bù đắp điều gì đó", phrase: "I forgot her birthday, so I must make it up to her.", category: "general" },
            { word: "Psychological", type: "vocab", meaning: "Tâm lý", phrase: "She is dealing with psychological stress right now.", category: "general" },
            { word: "Participant", type: "vocab", meaning: "Người tham gia", phrase: "Every participant received a small gift at the end.", category: "general" },
            { word: "Diary", type: "vocab", meaning: "Nhật ký", phrase: "She writes in her secret diary every night.", category: "general" },
            { word: "Process", type: "vocab", meaning: "Tiến trình, quá trình", phrase: "Learning a new language is a slow process.", category: "general" },
            { word: "Punish", type: "vocab", meaning: "Trừng phạt", phrase: "The teacher will punish students who cheat.", category: "general" },
            { word: "Reward", type: "vocab", meaning: "Thưởng", phrase: "The club will reward the best player with a trophy.", category: "general" },
            { word: "Stuck in trafic", type: "phrase/idiom", meaning: "Tắc đường", phrase: "Sorry I am late, I was stuck in traffic.", category: "general" },
            { word: "Politician", type: "vocab", meaning: "Nhà chính trị", phrase: "The politician promised to create more jobs.", category: "general" },
            { word: "Distinguish", type: "vocab", meaning: "Phân biệt", phrase: "It is hard to distinguish the twins from each other.", category: "general" },
            { word: "Influence", type: "vocab", meaning: "Ảnh hưởng", phrase: "Parents have a strong influence on their children.", category: "general" },
            { word: "Sources", type: "vocab", meaning: "Nguồn gốc", phrase: "We need to find reliable sources for our research.", category: "general" },
            { word: "Morally", type: "vocab", meaning: "Về mặt đạo đức", phrase: "It is morally wrong to steal from others.", category: "general" },
            { word: "Handle", type: "vocab", meaning: "Xử lý", phrase: "He knows how to handle difficult customers.", category: "general" },
            { word: "Peers", type: "vocab", meaning: "Đồng nghiệp", phrase: "He likes to dress the same way as his peers.", category: "general" },
            { word: "Acquaintance", type: "vocab", meaning: "Người quen", phrase: "He is not a close friend, just an acquaintance.", category: "general" },
            { word: "Categorize", type: "vocab", meaning: "Phân loại", phrase: "We categorize the books by subject.", category: "general" },
            { word: "Upbringing", type: "vocab", meaning: "Nuôi dưỡng", phrase: "She had a strict upbringing when she was young.", category: "general" },
            { word: "Dominant", type: "vocab", meaning: "Chỉ đạo, chi phối", phrase: "The home team played a dominant role in the game.", category: "general" },
            { word: "Bully", type: "vocab", meaning: "Bắt nạn", phrase: "You shouldn't let the school bully scare you.", category: "general" },
            { word: "Establish", type: "vocab", meaning: "Thiết lập", phrase: "They plan to establish a new business next year.", category: "general" },
            { word: "Mission", type: "vocab", meaning: "Nhiệm vụ", phrase: "Their mission is to provide clean water to villages.", category: "general" },
            { word: "Significant", type: "vocab", meaning: "Quan trọng, đáng kể", phrase: "There was a significant change in the weather.", category: "general" },
            { word: "Sense", type: "vocab", meaning: "Cảm giác", phrase: "Dogs have a very good sense of smell.", category: "general" },
            { word: "Divorce", type: "vocab", meaning: "Ly hôn", phrase: "Her parents' divorce was hard for her.", category: "general" },
            { word: "Shape", type: "vocab", meaning: "Hình dạng", phrase: "Education helps to shape a country's future.", category: "general" },
            { word: "Selflessness", type: "vocab", meaning: "Vị tha", phrase: "His selflessness made him a hero to everyone.", category: "general" },
            { word: "Miracle", type: "vocab", meaning: "Kì diệu, phép màu", phrase: "It is a miracle that he survived the crash.", category: "general" },
            { word: "Fragility", type: "vocab", meaning: "Mong manh", phrase: "The fragility of the glass means you must handle it with care.", category: "general" },
            { word: "Dilemma", type: "vocab", meaning: "Trình trạng/ Tình huống khó xử", phrase: "I am in a dilemma and don't know what to choose.", category: "general" },
            { word: "Activist", type: "vocab", meaning: "Nhà hoạt động", phrase: "The environmental activist organized a huge protest.", category: "general" },
            { word: "Refugee", type: "vocab", meaning: "Người tị nạn", phrase: "The refugee crossed the border to escape the war.", category: "general" },
            { word: "Wealthy", type: "vocab", meaning: "Giàu có", phrase: "They live in a large house in a wealthy neighborhood.", category: "general" },
            { word: "Numerous", type: "vocab", meaning: "nhiều", phrase: "He has won numerous awards for his music.", category: "general" },
            { word: "Decade", type: "vocab", meaning: "Thập kỷ", phrase: "The internet has changed a lot in the last decade.", category: "general" },
            { word: "Oppose", type: "vocab", meaning: "Phản đối", phrase: "I strongly oppose the new rules.", category: "general" },
            { word: "Nuclear", type: "vocab", meaning: "Nguyên tử, hạt nhân", phrase: "Many countries want to reduce nuclear energy.", category: "general" },
            { word: "Weapons", type: "vocab", meaning: "Vũ khí", phrase: "The police found illegal weapons in his car.", category: "general" }
        ];
const categoryLabels = { general: { label: "Từ vựng chung", class: "cat-goals" } };
let learnedWords=JSON.parse(localStorage.getItem('lv6unit2Learned')||'[]');let currentFilter='all';
function speakWord(w,b){window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(w);u.lang='en-US';u.rate=0.85;const v=window.speechSynthesis.getVoices();const e=v.find(x=>x.lang.startsWith('en'));if(e)u.voice=e;b.classList.add('speaking');u.onend=()=>b.classList.remove('speaking');u.onerror=()=>b.classList.remove('speaking');window.speechSynthesis.speak(u);}
function speakPhrase(h,b){const d=document.createElement('div');d.innerHTML=h;speakWord(d.textContent||d.innerText,b);}
if(window.speechSynthesis.onvoiceschanged!==undefined)window.speechSynthesis.onvoiceschanged=()=>{};
function renderCards(f='all',s=''){const g=document.getElementById('vocabGrid');g.innerHTML='';let d=vocabularyData;if(f!=='all')d=d.filter(v=>v.category===f);if(s){const q=s.toLowerCase();d=d.filter(v=>v.word.toLowerCase().includes(q)||v.meaning.toLowerCase().includes(q));}d.forEach(v=>{const c=categoryLabels[v.category];const il=learnedWords.includes(v.word);const card=document.createElement('div');card.className=`vocab-card ${il?'learned':''}`;card.style.opacity=il?'0.7':'1';const pe=v.phrase.replace(/'/g,"\\'");card.innerHTML=`<span class="category-tag ${c.class}">${c.label}</span><div class="word"><button class="speak-btn" onclick="event.stopPropagation();speakWord('${v.word.replace(/'/g,"\\'")}',this)">🔊</button><span>${il?'✅ ':''}${v.word}</span></div><span class="type">${v.type}</span><div class="meaning">${v.meaning}</div><div class="phrase"><div class="phrase-header"><button class="speak-btn" onclick="event.stopPropagation();speakPhrase('${pe}',this)">🔊</button><span class="phrase-label">Example:</span></div><p class="phrase-text">${v.phrase}</p></div>`;card.addEventListener('click',()=>card.classList.toggle('expanded'));card.addEventListener('dblclick',()=>toggleLearned(v.word));g.appendChild(card);});updateProgress();}
function toggleLearned(w){if(learnedWords.includes(w))learnedWords=learnedWords.filter(x=>x!==w);else learnedWords.push(w);localStorage.setItem('lv6unit2Learned',JSON.stringify(learnedWords));renderCards(currentFilter,document.getElementById('searchInput').value);}
function updateProgress(){const t=vocabularyData.length,l=learnedWords.length,p=Math.round((l/t)*100);document.getElementById('learnedWords').textContent=l;document.getElementById('totalWords').textContent=t;document.getElementById('progressFill').style.width=p+'%';document.getElementById('progressText').textContent=p+'%';}
document.querySelectorAll('.filter-btn').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');currentFilter=b.dataset.filter;renderCards(currentFilter,document.getElementById('searchInput').value);});});
document.getElementById('searchInput').addEventListener('input',e=>renderCards(currentFilter,e.target.value));
renderCards();
</script>
</body>
</html>
